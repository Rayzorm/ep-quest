     {t:"What it is", b:"Exercise during and after cancer treatment is <b>safe and beneficial</b> for most people: it reduces fatigue, preserves strength and function, and improves quality of life. Programs flex around the treatment cycle and side effects."},
     {t:"Treatment effects", b:"Chemo and radiation can cause fatigue, <b>anaemia</b>, <b>neutropenia</b> (infection risk) and peripheral <b>neuropathy</b>. Blood counts fluctuate, so capacity varies day to day. Surgery and some treatments carry site-specific precautions."},
     {t:"Day-to-day flexing", b:"<b>Autoregulate</b>: a good day means a bit more, a bad day means gentle movement or rest. During treatment the goal is often <b>maintenance</b> — staying 'flat' through a hard cycle is a genuine win."},
     {t:"Safety & red flags", b:"On low-count (<b>neutropenic</b>) days, avoid high intensity and crowded/germy settings; <b>fever</b> → medical review. <b>Anaemia</b> → reduce load, watch dizziness/breathlessness. <b>Bone metastases</b> → no high-impact at those sites. Liaise with the oncology team."},
     {t:"Starting dose & progression", b:"Short, flexible bouts (5–10 min) plus light strength, scaled to the day. Use stable, supported balance work if there's neuropathy. Progress volume on good stretches, and expect to regress around treatment cycles."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"Is exercise safe during cancer treatment?",
      options:["No, rest completely","Yes — safe and beneficial for most, flexed to the day","Only after all treatment ends","Only competitive sport"], answer:1, explain:"Exercise during treatment reduces fatigue and preserves function for most."},
     {type:"mc", kind:"Check", q:"On a neutropenic (low white-cell) day you should:",
      options:["Do your hardest session","Avoid high intensity and crowded/germy settings","Cancel exercise forever","Ignore it"], answer:1, explain:"Lower intensity and infection exposure; fever → review."},
     {type:"mc", kind:"Check", q:"With known bone metastases, avoid:",
      options:["All movement","High-impact loading at the metastatic sites","Light walking","Breathing exercises"], answer:1, explain:"No high-impact at metastatic sites — fracture risk."},
   ]},
 { id:"asthma", name:"Asthma", icon:"🌬️", color:"var(--teal)", shadow:"var(--teal-d)",
   cards:[
     {t:"What it is", b:"<b>Asthma</b> is reversible narrowing of the airways — bronchospasm and inflammation — triggered by exercise, cold or dry air, allergens or infection. <b>Exercise-induced bronchoconstriction (EIB)</b> is common. With good control, exercise is encouraged and beneficial."},
     {t:"What happens during exercise", b:"EIB typically comes on <b>5–15 minutes</b> into or after exercise. <b>Cold, dry air</b> makes it worse; warm, humid air (like swimming) is better tolerated. A proper <b>warm-up reduces EIB</b> by triggering a refractory period."},
     {t:"Medications that matter", b:"A <b>reliever</b> (short-acting beta-agonist such as salbutamol) taken <b>~15 min before</b> exercise can prevent EIB. <b>Preventers</b> (inhaled corticosteroids) control the underlying inflammation. Always keep the reliever on hand."},
     {t:"Safety & red flags", b:"Stop and use the reliever for wheeze, chest tightness or a cough that limits exercise. A <b>severe attack</b> — can't speak in sentences, reliever not helping, blue lips — is an emergency → <b>000</b>. Don't exercise during an attack or when poorly controlled."},
     {t:"Starting dose & progression", b:"Use an extended <b>warm-up</b>, interval formats, and warm/humid environments where possible. Avoid known triggers (cold dry air, high pollen). Progress gradually — well-controlled asthmatics can train to a high level."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"When should a reliever be taken to prevent EIB?",
      options:["After exercise only","About 15 min before exercise","Never","Only mid-session"], answer:1, explain:"A reliever ~15 min pre-exercise helps prevent exercise-induced bronchoconstriction."},
     {type:"mc", kind:"Check", q:"How does a proper warm-up affect EIB?",
      options:["Worsens it","Reduces it (refractory period)","No effect","Triggers an attack"], answer:1, explain:"Warming up reduces EIB via a refractory period."},
     {type:"mc", kind:"Check", q:"Severe attack: can't speak, reliever not working. You:",
      options:["Keep exercising lightly","Call 000","Offer water","Stretch the chest"], answer:1, explain:"A severe attack unresponsive to reliever is an emergency → 000."},
   ]},
 { id:"ckd", name:"Chronic Kidney Disease", icon:"🫘", color:"var(--purple)", shadow:"var(--purple-d)",
   cards:[
     {t:"What it is", b:"<b>Chronic kidney disease</b> is a progressive loss of kidney function. It brings high cardiovascular risk, anaemia, fatigue, muscle wasting and bone-mineral problems. Exercise is safe and beneficial across all stages, <b>including on dialysis</b>."},
     {t:"What happens during exercise", b:"Capacity is often reduced by anaemia and deconditioning, and <b>cardiovascular comorbidity is high</b>. Resistance training helps counter muscle wasting; aerobic training improves capacity and cardiovascular risk."},
     {t:"Key considerations", b:"Protect the <b>fistula / dialysis access arm</b> — no heavy loading and no BP cuff on that arm. Be mindful of fluid and electrolyte shifts and blood-pressure swings around dialysis sessions."},
     {t:"Safety & red flags", b:"Watch for cardiac symptoms (CV risk is high), signs of fluid overload (breathlessness, swelling) and excessive fatigue. Avoid heavy loading through the access arm."},
     {t:"Starting dose & progression", b:"Aerobic plus resistance at <b>moderate</b> intensity, starting low. For dialysis patients, exercise is often best on <b>non-dialysis days</b> or in the first half of a session. Progress gradually as tolerated."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"What must you protect on a dialysis patient?",
      options:["The fistula/access arm — no BP cuff or heavy load","Their dominant hand","Their ankles","Nothing special"], answer:0, explain:"Avoid BP cuffs and heavy loading on the fistula/access arm."},
     {type:"mc", kind:"Check", q:"Is exercise safe in CKD, including on dialysis?",
      options:["No","Yes — safe and beneficial across stages","Only pre-dialysis","Only for transplant patients"], answer:1, explain:"Exercise is safe and beneficial at all CKD stages, including dialysis."},
     {type:"mc", kind:"Check", q:"Which comorbidity risk is especially high in CKD?",
      options:["Cardiovascular disease","Hay fever","Tendinopathy","Vertigo"], answer:0, explain:"CKD carries high cardiovascular risk — watch for cardiac symptoms."},
   ]},
 { id:"pad", name:"Peripheral Arterial Disease", icon:"🦶", color:"var(--red)", shadow:"var(--red-d)",
   cards:[
     {t:"What it is", b:"<b>Peripheral arterial disease</b> is atherosclerosis narrowing the leg arteries, reducing blood flow. The classic symptom is <b>intermittent claudication</b> — cramping calf pain on walking that eases with rest. It signals widespread cardiovascular disease."},
     {t:"What happens during exercise", b:"Walking brings on claudication pain as muscle demand outstrips supply. Counter-intuitively, <b>supervised walking to moderate claudication pain</b> is the treatment — it builds collateral flow and markedly improves pain-free walking distance."},
     {t:"Medications & considerations", b:"Antiplatelets, statins and BP medicines manage the underlying disease. <b>Foot care</b> matters — poor circulation means wounds heal slowly. Manage overall cardiovascular risk."},
     {t:"Safety & red flags", b:"<b>Rest pain</b> (foot pain at rest), non-healing wounds, or a cold/pale foot suggest <b>critical limb ischaemia</b> → urgent vascular review. High CV risk also means watching for cardiac symptoms."},
     {t:"Starting dose & progression", b:"Walk to <b>moderate</b> claudication pain (about 3 out of 5), rest until it eases, then repeat — aiming for <b>30+ minutes</b>, most days. Progress walking time and distance as tolerance improves."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"Supervised walking in PAD is best described as:",
      options:["Dangerous, avoid it","The treatment — it improves walking distance","Pointless","Only for fitness"], answer:1, explain:"Walking to moderate claudication pain is the evidence-based treatment."},
     {type:"mc", kind:"Check", q:"How do you dose the walking?",
      options:["Avoid all pain","Walk to moderate claudication pain, rest, repeat","Sprint until exhausted","Walk pain-free only"], answer:1, explain:"Walk to moderate pain, rest until it eases, repeat — 30+ min most days."},
     {type:"mc", kind:"Check", q:"Foot pain at rest or a non-healing wound means:",
      options:["Push harder","Urgent vascular review — possible critical ischaemia","Ignore it","More walking"], answer:1, explain:"Rest pain / non-healing wounds suggest critical limb ischaemia → urgent referral."},
   ]},
 { id:"pregnancy", name:"Pregnancy", icon:"🤰", color:"var(--green)", shadow:"var(--green-d)",
   cards:[
     {t:"What it is", b:"In a <b>healthy pregnancy</b>, exercise is recommended and safe. It improves fitness and mood and reduces the risk of gestational diabetes, pre-eclampsia and excessive weight gain. The guide is about <b>150 min/week</b> of moderate activity."},
     {t:"What happens during exercise", b:"Heart rate and blood volume rise; later, balance shifts and the growing uterus can compress the vena cava — so <b>avoid prolonged supine</b> (on-the-back) positions after ~16 weeks. <b>Relaxin</b> increases joint laxity. Pelvic-floor and core work are valuable."},
     {t:"Key considerations", b:"Avoid contact and fall-risk sports, scuba diving, and <b>overheating</b>; stay hydrated. Modify movements as the bump grows. Use the <b>talk test</b> for intensity rather than pushing to exhaustion."},
     {t:"Safety & red flags", b:"<b>Stop and seek care</b> for vaginal bleeding, fluid leakage, regular painful contractions, dizziness or faintness, chest pain, calf pain/swelling, or headache. Obstetric complications need clearance first."},
     {t:"Starting dose & progression", b:"Around <b>150 min/week</b> of moderate aerobic (talk-test intensity), plus strength and pelvic-floor work. Adjust intensity and positions as pregnancy progresses; comfort and symptoms guide progression."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"Rough weekly activity target in healthy pregnancy?",
      options:["30 min/week","~150 min/week moderate","10 hours/week","None — rest"], answer:1, explain:"About 150 min/week of moderate activity is the guide."},
     {type:"mc", kind:"Check", q:"After ~16 weeks, what should you avoid?",
      options:["All standing","Prolonged supine (on-the-back) positions","Walking","Pelvic-floor work"], answer:1, explain:"Prolonged supine positions can compress the vena cava — avoid after ~16 weeks."},
     {type:"mc", kind:"Check", q:"Which is a stop-and-seek-care warning sign?",
      options:["Mild leg fatigue","Vaginal bleeding or fluid leakage","Feeling warm","Light sweating"], answer:1, explain:"Bleeding, fluid leak, contractions, chest pain, dizziness → stop and seek care."},
   ]},
 { id:"lbp", name:"Low Back Pain", icon:"💢", color:"var(--gold)", shadow:"var(--gold-d)",
   cards:[
     {t:"What it is", b:"Most low back pain is <b>non-specific</b> — no serious underlying disease — and is <b>safe to move and load</b>. Imaging changes like 'degeneration' are common and usually aren't the pain source. Staying active beats rest, and <b>fear-avoidance</b> is often a bigger problem than the tissue."},
     {t:"Screen red flags first", b:"Always screen: cauda equina (<b>saddle numbness, bladder/bowel changes, bilateral leg symptoms</b>) → ED; plus cancer history, unexplained weight loss, night pain, fever, or major trauma → refer. With those cleared, loading is safe."},
     {t:"Hurt ≠ harm", b:"Soreness that settles by the next day doesn't mean damage. <b>Graded exposure</b> to feared movements, general exercise and reassurance rebuild capacity and confidence. The message itself is part of the treatment."},
     {t:"What happens during exercise", b:"Movement tends to <b>desensitise</b> the back over time. Pick exercises and ranges the client feels safe with first — early wins rebuild trust — then progress."},
     {t:"Starting dose & progression", b:"Graded walking plus a few tolerated movements (hip hinge, sit-to-stand, carries). Progress <b>range first, then load</b>, guided by the 24-hour response. Keep educating that sore ≠ damaged."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"Most non-specific low back pain is:",
      options:["Dangerous to load","Safe to move and load","A reason for bed rest","Caused by disc 'damage'"], answer:1, explain:"Non-specific LBP is safe to load; staying active beats rest."},
     {type:"mc", kind:"Check", q:"Saddle numbness + new bladder changes means:",
      options:["Prescribe core work","Cauda equina → emergency department","Massage","Just rest"], answer:1, explain:"Saddle anaesthesia + bladder/bowel change = cauda equina red flag → ED."},
     {type:"mc", kind:"Check", q:"The key message for most low back pain is:",
      options:["Protect and rest it","Hurt ≠ harm — graded loading helps","Avoid all bending forever","Surgery is needed"], answer:1, explain:"Hurt ≠ harm; graded exposure and activity rebuild the back."},
   ]},
 { id:"mental", name:"Mental Health", icon:"💙", color:"var(--blue)", shadow:"var(--blue-d)",
   cards:[
     {t:"What it is", b:"Exercise is an <b>evidence-based treatment</b> for depression and anxiety — comparable to medication or therapy for mild-to-moderate depression. It improves mood, sleep and self-efficacy. Both aerobic and resistance training help."},
     {t:"What happens during exercise", b:"The bodily sensations of exertion (raised heart rate, faster breathing, sweating) can <b>mimic anxiety or panic</b>. Explaining this in advance stops clients misreading a normal exercise response as danger. Early successes build self-efficacy."},
     {t:"Key considerations", b:"Motivation and energy are often low, so <b>reduce barriers</b>: keep it simple, build a routine, add enjoyment and social elements. Watch medications (some cause sedation, weight gain or postural drops)."},
     {t:"Safety & red flags", b:"Ask about <b>suicidal ideation</b> or acute crisis → refer to appropriate care; exercise is an <b>adjunct</b>, not a replacement for treatment. Screen for compulsive over-exercise (e.g. with eating disorders)."},
     {t:"Starting dose & progression", b:"Any movement counts. Aim toward <b>150 min/week</b> moderate, but start tiny and consistent — <b>behavioural activation</b> (just scheduling it) is powerful. Adherence matters more than intensity."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"For mild-to-moderate depression, exercise is:",
      options:["Useless","An evidence-based treatment, comparable to meds/therapy","Only for athletes","Harmful"], answer:1, explain:"Exercise is an evidence-based treatment for mild-moderate depression."},
     {type:"mc", kind:"Check", q:"Why pre-explain exercise sensations to an anxious client?",
      options:["To scare them","So raised HR/breathing aren't misread as panic","No reason","To push harder"], answer:1, explain:"Exertion sensations mimic anxiety — explaining prevents misinterpretation."},
     {type:"mc", kind:"Check", q:"A client discloses suicidal thoughts. You:",
      options:["Just keep training","Refer to appropriate care — exercise is an adjunct","Ignore it","End all sessions"], answer:1, explain:"Refer for crisis care; exercise supports but doesn't replace treatment."},
   ]},
 { id:"dementia", name:"Dementia", icon:"🧩", color:"var(--purple)", shadow:"var(--purple-d)",
   cards:[
     {t:"What it is", b:"Progressive cognitive decline (commonly Alzheimer's). Exercise supports function, mood and behaviour, may slow decline, and reduces falls. <b>Routine and familiarity</b> make sessions work."},
     {t:"What happens during exercise", b:"Clients may not recall instructions, so use <b>simple cues, demonstration and repetition</b>, with a consistent environment and trainer. Apathy or agitation vary day to day — meet them where they are."},
     {t:"Key considerations", b:"<b>Falls risk is high</b> — supervise. Communicate in short, clear, calm prompts and reduce distractions. Involve carers, and remember cardiovascular comorbidity is common."},
     {t:"Safety & red flags", b:"Watch for falls and wandering. A <b>sudden change in behaviour or alertness</b> can signal delirium or infection → review. Apply standard cardiac/BP rules."},
     {t:"Starting dose & progression", b:"Simple, repetitive <b>functional + balance + walking</b> work in a consistent routine. Progress by repetition before complexity. Keep it enjoyable and habitual."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"Best communication approach with dementia clients?",
      options:["Long detailed instructions","Simple cues, demonstration, repetition, routine","Write a manual","Change trainers often"], answer:1, explain:"Simple cues, demonstration and consistent routine work best."},
     {type:"mc", kind:"Check", q:"Falls risk in dementia means you should:",
      options:["Train unsupervised","Supervise closely","Avoid all movement","Only use machines"], answer:1, explain:"Falls risk is high — supervise."},
     {type:"mc", kind:"Check", q:"A sudden change in behaviour/alertness could be:",
      options:["Normal — ignore","Delirium or infection → review","Just laziness","A reason to push harder"], answer:1, explain:"Acute change may signal delirium/infection → medical review."},
   ]},
 { id:"ms", name:"Multiple Sclerosis", icon:"🌀", color:"var(--teal)", shadow:"var(--teal-d)",
   cards:[
     {t:"What it is", b:"An autoimmune demyelination of the central nervous system causing variable symptoms — fatigue, weakness, spasticity, balance and sensory changes, and heat sensitivity. Exercise improves function, fatigue and quality of life; it's <b>no longer contraindicated</b>."},
     {t:"What happens during exercise", b:"<b>Heat sensitivity (Uhthoff's phenomenon)</b> means overheating can transiently worsen symptoms — keep cool (cooling aids, morning sessions, hydration). Fatigue is a major factor, and weakness/balance issues raise falls risk."},
     {t:"Key considerations", b:"<b>Fatigue management</b> is central — dose to energy and rest as needed. Account for spasticity and bladder issues. During a <b>relapse</b>, back off and rebuild afterward."},
     {t:"Safety & red flags", b:"A relapse (new or worsening neuro symptoms over days) → liaise with the team and reduce load. Watch falls. If overheating worsens symptoms, cool down."},
     {t:"Starting dose & progression", b:"Aerobic + resistance + balance at <b>moderate</b> intensity in a <b>cool</b> environment; autoregulate to fatigue. Progress gradually, expecting fluctuation around relapses."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"Why keep MS clients cool during exercise?",
      options:["Comfort only","Heat sensitivity (Uhthoff's) can worsen symptoms","No reason","To save energy bills"], answer:1, explain:"Overheating transiently worsens MS symptoms — keep cool."},
     {type:"mc", kind:"Check", q:"Is exercise safe and beneficial in MS?",
      options:["No, it's contraindicated","Yes — improves fatigue, function and QoL","Only in remission","Only stretching"], answer:1, explain:"Exercise is beneficial in MS and no longer contraindicated."},
     {type:"mc", kind:"Check", q:"During an MS relapse you should:",
      options:["Push through hard","Back off and liaise with the team","Stop exercise forever","Add high intensity"], answer:1, explain:"Reduce load during a relapse and rebuild afterward."},
   ]},
 { id:"fibro", name:"Fibromyalgia", icon:"💠", color:"var(--green)", shadow:"var(--green-d)",
   cards:[
     {t:"What it is", b:"Chronic widespread pain with fatigue, poor sleep and cognitive issues — a disorder of <b>central pain processing (sensitisation)</b>, not joint or muscle damage. Exercise (especially aerobic plus gradual strength) is a core treatment."},
     {t:"What happens during exercise", b:"Clients are prone to <b>post-exertional flares</b> if pushed too hard too soon. <b>Start low, go slow.</b> Pain ≠ damage — gentle, graded, consistent activity desensitises the system over time."},
     {t:"Key considerations", b:"<b>Pacing</b> is everything — avoid boom-bust cycles. Manage expectations toward gradual gains. Address sleep, stress and beliefs. <b>Warm-water</b> exercise is often well tolerated."},
     {t:"Safety & red flags", b:"Usually safe; screen for other pathology if the picture is atypical. A big flare means the dose was too high → <b>regress, don't stop</b>."},
     {t:"Starting dose & progression", b:"Very gentle aerobic (even 5–10 min), gradual strength, consistency over intensity. Progress in <b>tiny increments</b> guided by the flare response. Hydrotherapy can help."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"The guiding principle for exercise in fibromyalgia is:",
      options:["No pain, no gain","Start low, go slow — pace, avoid boom-bust","Max effort daily","Complete rest"], answer:1, explain:"Pacing and gradual progression avoid post-exertional flares."},
     {type:"mc", kind:"Check", q:"Fibromyalgia pain reflects:",
      options:["Joint destruction","Central sensitisation — pain ≠ damage","Broken bones","Infection"], answer:1, explain:"It's a central pain-processing disorder; hurt ≠ harm."},
     {type:"mc", kind:"Check", q:"After a big flare you should:",
      options:["Stop exercising for good","Regress the dose and rebuild","Push through it","Double the intensity"], answer:1, explain:"A flare means too much too soon — regress, don't stop."},
   ]},
 { id:"longcovid", name:"Long COVID", icon:"🦠", color:"var(--red)", shadow:"var(--red-d)",
   cards:[
     {t:"What it is", b:"Persistent symptoms after COVID — fatigue, breathlessness, brain fog, palpitations. A subset have <b>post-exertional symptom exacerbation (PESE/PEM)</b>: overexertion triggers a delayed crash. Your approach hinges on screening for this."},
     {t:"What happens during exercise", b:"<b>Screen for post-exertional malaise first.</b> If PESE is present, do NOT use graded exercise that provokes crashes — use <b>pacing</b> and symptom-titrated activity within the energy envelope. If no PESE, a cautious graded return is fine."},
     {t:"Key considerations", b:"Watch for <b>resting tachycardia</b> or POTS-type responses, exertional desaturation, and chest symptoms — flag cardiac/respiratory issues. Heart-rate monitoring can help cap effort."},
     {t:"Safety & red flags", b:"Chest pain, syncope, exertional desaturation or marked palpitations → medical review before progressing. Post-exertional crashes mean pull back and pace."},
     {t:"Starting dose & progression", b:"With PESE: pace within the energy envelope, no push-through. Without PESE: start very low, progress slowly, and watch the <b>next-day response</b> closely."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"The first thing to screen for in Long COVID is:",
      options:["1RM strength","Post-exertional malaise (PESE/PEM)","Flexibility","Body fat"], answer:1, explain:"Screen for post-exertional symptom exacerbation before any graded exercise."},
     {type:"mc", kind:"Check", q:"If post-exertional malaise is present, you should:",
      options:["Push through with graded exercise","Pace within the energy envelope — no push-through","Do HIIT","Ignore symptoms"], answer:1, explain:"With PESE, avoid provoking crashes — pace, don't push."},
     {type:"mc", kind:"Check", q:"Which warrants medical review before progressing?",
      options:["Mild tiredness","Chest pain or exertional desaturation","A good session","Slight sweat"], answer:1, explain:"Chest pain, syncope, desaturation, marked palpitations → review."},
   ]},
 { id:"obesity", name:"Obesity / Metabolic", icon:"⚖️", color:"var(--gold)", shadow:"var(--gold-d)",
   cards:[
     {t:"What it is", b:"Excess adiposity raises the risk of type 2 diabetes, cardiovascular disease, osteoarthritis and sleep apnoea. Importantly, exercise improves metabolic health and fitness <b>even without big weight loss</b> — fitness matters independently of weight."},
     {t:"What happens during exercise", b:"Expect higher <b>joint loads</b> and heat intolerance, and often deconditioning with hidden cardiovascular risk. <b>Low-impact</b> modes (walking, bike, water) protect joints. Fitness and metabolic gains arrive before the scale moves."},
     {t:"Key considerations", b:"Focus on behaviour, volume and enjoyment rather than just calories. Screen cardiovascular risk. A <b>weight-neutral</b> framing supports adherence. Build volume before intensity."},
     {t:"Safety & red flags", b:"Watch for silent cardiac risk (chest pain, undue breathlessness), joint pain with high-impact work, and sleep-apnoea symptoms. Start low-impact."},
     {t:"Starting dose & progression", b:"Start with low-impact aerobic, build <b>duration and volume first</b>, and add strength to protect muscle. Progress volume before intensity. Adherence is the real outcome."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"Exercise benefits in obesity:",
      options:["Only count if weight drops","Improve health & fitness even without big weight loss","Are minimal","Require high impact"], answer:1, explain:"Fitness and metabolic benefits occur independent of weight loss."},
     {type:"mc", kind:"Check", q:"Why favour low-impact modes early?",
      options:["They're easier to bill","Protect joints and manage heat intolerance","They burn more fat","No reason"], answer:1, explain:"Low-impact protects joints and suits heat intolerance and deconditioning."},
     {type:"mc", kind:"Check", q:"The progression priority is:",
      options:["Intensity first","Build volume/duration before intensity","Max effort immediately","Only strength"], answer:1, explain:"Build volume first, then intensity; adherence is the real outcome."},
   ]},
 { id:"sci", name:"Spinal Cord Injury", icon:"♿", color:"var(--blue)", shadow:"var(--blue-d)",
   cards:[
     {t:"What it is", b:"Damage to the spinal cord causes loss of motor and sensory function <b>below the level of injury</b> (tetraplegia from cervical injury, paraplegia from thoracic/lumbar; complete or incomplete). Exercise is vital for cardiometabolic health, function and preventing secondary complications."},
     {t:"What happens during exercise", b:"With injuries above ~T6, autonomic control is impaired: <b>blunted heart rate</b> (may not exceed ~120), low BP, and poor thermoregulation. Less active muscle mass means lower peak capacity — use <b>RPE</b> and watch overheating."},
     {t:"Autonomic dysreflexia (key danger)", b:"In lesions at or above <b>T6</b>, a noxious stimulus below the injury (full bladder, tight strap, skin pressure) can trigger a sudden <b>dangerous BP spike</b> with a pounding headache and sweating above the injury. → <b>Stop, sit upright, find and remove the cause</b>; emergency if not resolving."},
     {t:"Key considerations", b:"Protect skin from <b>pressure injuries</b> (offload, check skin), manage <b>thermoregulation</b> (keep cool, hydrate), and protect the <b>shoulders</b> (wheelchair users overuse them). Bone density is lost below the injury."},
     {t:"Starting dose & progression", b:"Arm-crank, resistance and FES-based training; build volume gradually. Manage skin and temperature throughout, and protect shoulders. Progress as tolerance and skin integrity allow."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"Sudden pounding headache + BP spike in a T4 injury suggests:",
      options:["Normal exertion","Autonomic dysreflexia → stop, sit up, remove the cause","Dehydration only","Good progress"], answer:1, explain:"Autonomic dysreflexia: stop, sit upright, find/remove the trigger; emergency if it persists."},
     {type:"mc", kind:"Check", q:"With a high SCI, how do you gauge aerobic intensity?",
      options:["Target heart rate","RPE — heart rate is blunted","Max HR test","Step count"], answer:1, explain:"Autonomic impairment blunts HR above ~T6 — use RPE."},
     {type:"mc", kind:"Check", q:"A key ongoing risk to manage in SCI is:",
      options:["Pressure injuries / skin breakdown","Hay fever","Tennis elbow","Snoring"], answer:0, explain:"Skin/pressure care (plus thermoregulation and shoulder protection) is essential."},
   ]},
 { id:"joint", name:"Joint Replacement", icon:"🛠️", color:"var(--teal)", shadow:"var(--teal-d)",
   cards:[
     {t:"What it is", b:"Total <b>knee (TKR)</b> or <b>hip (THR)</b> replacement for end-stage osteoarthritis. Rehab restores strength, range of motion and function — early supervised exercise improves outcomes. Always work to the <b>surgeon's protocol and timelines</b>."},
     {t:"What happens during exercise", b:"Early on there's pain, swelling and limited range; strength deficits can persist for months. Progressive loading is what restores function — but it's staged around healing."},
     {t:"THR precautions", b:"Depending on the surgical approach (especially <b>posterior</b>), early <b>hip precautions</b> may apply for ~6–12 weeks: avoid deep flexion past 90°, adduction past midline, and internal rotation. Confirm the specifics with the surgeon."},
     {t:"TKR focus", b:"Prioritise regaining <b>full knee extension</b> (straightening) and flexion early, plus <b>quadriceps</b> strength and swelling management. Lost extension is hard to get back later."},
     {t:"Safety & progression", b:"Watch for <b>infection</b> (increasing redness/heat, fever, wound discharge), <b>DVT</b> (calf pain/swelling) and, for THR, dislocation → refer. Progress ROM and load guided by pain/swelling and the surgeon's stage."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"Early after a posterior-approach THR, you typically avoid:",
      options:["All walking","Deep hip flexion >90°, adduction, internal rotation","Any arm exercise","Breathing exercises"], answer:1, explain:"Posterior THR often has early precautions: no deep flexion, adduction past midline, or internal rotation."},
     {type:"mc", kind:"Check", q:"A priority after total knee replacement is:",
      options:["Maximal sprinting","Restoring full knee extension and quad strength","Avoiding all knee movement","Heavy loaded twisting"], answer:1, explain:"Regain extension early plus quadriceps strength; manage swelling."},
     {type:"mc", kind:"Check", q:"Increasing redness, heat, fever and wound discharge means:",
      options:["Push harder","Possible infection → refer","Normal healing","More stretching"], answer:1, explain:"Signs of infection (or DVT/dislocation) → refer, follow the surgeon's protocol."},
   ]},
 { id:"paeds", name:"Children & Teens", icon:"🧒", color:"var(--gold)", shadow:"var(--gold-d)",
   cards:[
     {t:"What it is", b:"Kids aren't small adults. Guidelines: <b>≥60 min/day</b> of moderate-to-vigorous activity (mostly aerobic) plus muscle- and bone-strengthening <b>3×/week</b>. Activity builds fitness, bone, motor skills and confidence."},
     {t:"What happens during exercise", b:"Children recover quickly aerobically but thermoregulate less efficiently — watch <b>heat and hydration</b>. <b>Resistance training is safe</b> with supervision and good technique; the idea it 'stunts growth' is a myth."},
     {t:"Key considerations", b:"Emphasise <b>fun, variety, skill development and play</b>. Avoid early over-specialisation and overuse. Around growth plates, prioritise technique over maximal load; watch growth-related conditions (e.g. Osgood-Schlatter)."},
     {t:"Safety & red flags", b:"Watch for overuse injuries, growth-plate pain, and exercise-induced symptoms (screen asthma/cardiac if present). In adolescent athletes, screen for under-fuelling / RED-S."},
     {t:"Starting dose & progression", b:"≥60 min/day of varied activity plus strengthening 3×/week. Progress skill and volume while keeping it playful and broad rather than narrowly specialised."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"Daily activity target for children & teens?",
      options:["10 min/day","≥60 min/day moderate-to-vigorous","5 hours/day","None needed"], answer:1, explain:"≥60 min/day MVPA plus strengthening 3×/week."},
     {type:"mc", kind:"Check", q:"Is supervised resistance training safe for youth?",
      options:["No — it stunts growth","Yes — safe with supervision and technique","Only after age 18","Only for elite athletes"], answer:1, explain:"It's safe with supervision; the growth-stunting claim is a myth."},
     {type:"mc", kind:"Check", q:"The main emphasis for kids should be:",
      options:["Early specialisation and max lifting","Fun, variety, skill and play","Adult training programs","Competition only"], answer:1, explain:"Keep it fun, varied and skill-focused; avoid overuse and over-specialisation."},
   ]},
 { id:"frailty", name:"Frailty & Sarcopenia", icon:"👴", color:"var(--purple)", shadow:"var(--purple-d)",
   cards:[
     {t:"What it is", b:"<b>Frailty</b> is reduced physiological reserve and vulnerability; <b>sarcopenia</b> is age-related loss of muscle mass and strength. Together they drive falls, disability and dependence. <b>Progressive resistance training</b> is the most effective intervention."},
     {t:"What happens during exercise", b:"Baseline strength and power are low. <b>Power</b> (force × speed) declines faster than strength and matters most for real-world tasks (stairs, recovering balance). Multicomponent training works best."},
     {t:"Key considerations", b:"The common mistake is <b>under-dosing</b> — frail does not mean fragile; you must genuinely progress the load. Address protein/nutrition, polypharmacy, falls history and cognition alongside the exercise."},
     {t:"Safety & red flags", b:"Watch falls, acute deconditioning or illness, and unintentional weight loss. Apply standard cardiac/BP rules. Start low — but then build."},
     {t:"Starting dose & progression", b:"<b>Progressive resistance 2–3×/week</b> (including power work), daily balance, and aerobic activity. Keep it function-focused (sit-to-stand, stairs, gait) and progress the load over time."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"The most effective intervention for sarcopenia is:",
      options:["Stretching","Progressive resistance training","Bed rest","Aerobic only"], answer:1, explain:"Progressive resistance training is the key intervention — and don't under-dose it."},
     {type:"mc", kind:"Check", q:"Which quality matters most for function in older adults?",
      options:["Maximal strength only","Power (force × speed)","Flexibility","Grip alone"], answer:1, explain:"Power declines fastest and drives function — train it, not just slow strength."},
     {type:"mc", kind:"Check", q:"The common dosing mistake with frail clients is:",
      options:["Under-dosing — too light, no progression","Overloading from day one","Too much stretching","Too much aerobic"], answer:0, explain:"Frail ≠ fragile — under-dosing is the usual error; progress the resistance."},
   ]},
 { id:"pots", name:"PoTS", icon:"💫", color:"var(--red)", shadow:"var(--red-d)",
   cards:[
     {t:"What it is", b:"Postural orthostatic tachycardia syndrome: an abnormal heart-rate rise (<b>≥30 bpm</b>, or ≥40 in teens) on standing, with symptoms (dizziness, palpitations, fatigue, brain fog) but <b>without a big BP drop</b>. Structured exercise is a cornerstone treatment."},
     {t:"What happens during exercise", b:"Upright exercise provokes symptoms, so <b>start in recumbent/horizontal positions</b> (recumbent bike, rowing, swimming, floor work) and progress toward upright over time. Deconditioning worsens PoTS — reconditioning is the treatment."},
     {t:"Key considerations", b:"Increase <b>fluids and salt</b> (as advised), use <b>compression garments</b>, and avoid sudden standing and heat. Lower-limb and core strengthening aids venous return. Expect a slow, graded build."},
     {t:"Safety & red flags", b:"Syncope or chest pain → review. Don't be discouraged by early symptom provocation — start recumbent and progress patiently. Screen for other causes of the symptoms."},
     {t:"Starting dose & progression", b:"Begin with <b>recumbent</b> aerobic plus lower-body strength; build duration, then gradually transition to upright over weeks to months. Fluids, salt and compression support the program."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"Where should exercise for PoTS usually start?",
      options:["Standing/upright","Recumbent / horizontal (bike, row, swim)","Running","Overhead lifting"], answer:1, explain:"Start recumbent to limit symptom provocation, then progress to upright."},
     {type:"mc", kind:"Check", q:"PoTS is defined by:",
      options:["A big drop in BP","An abnormal HR rise (≥30 bpm) on standing","High resting BP","Low heart rate"], answer:1, explain:"An excessive HR rise on standing (≥30 bpm; ≥40 in teens) without a large BP drop."},
     {type:"mc", kind:"Check", q:"Which supports PoTS management alongside exercise?",
      options:["Dehydration","Fluids, salt and compression garments","Skipping meals","Hot environments"], answer:1, explain:"Fluids, salt and compression aid venous return; avoid heat and sudden standing."},
   ]},
 { id:"amputation", name:"Amputation", icon:"🦿", color:"var(--green)", shadow:"var(--green-d)",
   cards:[
     {t:"What it is", b:"Limb loss — commonly lower-limb, often from PAD/diabetes (dysvascular) or trauma. Exercise restores function, supports prosthetic use, manages comorbidities and protects the remaining limb."},
     {t:"What happens during exercise", b:"Walking with a prosthesis has a <b>higher energy cost</b> (more so for higher-level or bilateral amputations), and deconditioning is common. Balance and the intact limb are heavily relied upon, and dysvascular causes mean frequent cardiometabolic comorbidity."},
     {t:"Key considerations", b:"Care for the <b>residual limb</b> skin and socket fit (check for breakdown), and <b>protect the sound (intact) limb</b> from overuse. Train balance, plus hip and core strength for prosthetic control. Manage phantom/residual pain."},
     {t:"Safety & red flags", b:"Skin breakdown or poor socket fit → prosthetist. Watch for vascular compromise in the remaining limb and for falls. Manage cardiovascular risk."},
     {t:"Starting dose & progression", b:"Balance, hip/core and intact-limb strength, adapted aerobic (e.g. arm work), and prosthetic gait practice. Progress as skin integrity, socket fit and balance allow."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"A key thing to protect in lower-limb amputees is:",
      options:["The sound (intact) limb from overuse + residual-limb skin","Their hearing","Their grip only","Nothing in particular"], answer:0, explain:"Protect the intact limb from overuse and watch residual-limb skin/socket fit."},
     {type:"mc", kind:"Check", q:"Walking with a prosthesis typically has:",
      options:["A lower energy cost","A higher energy cost than normal gait","No energy cost","The same cost as running"], answer:1, explain:"Prosthetic walking costs more energy — more so for higher-level/bilateral amputations."},
     {type:"mc", kind:"Check", q:"Training focus for prosthetic control includes:",
      options:["Only upper body","Balance plus hip and core strength","Only stretching","Avoiding all balance work"], answer:1, explain:"Balance and hip/core strength underpin prosthetic gait and stability."},
   ]},
 { id:"mecfs", name:"ME / CFS", icon:"🔋", color:"var(--teal)", shadow:"var(--teal-d)",
   cards:[
     {t:"What it is", b:"Myalgic encephalomyelitis / chronic fatigue syndrome: a chronic condition with profound fatigue not relieved by rest, unrefreshing sleep, cognitive problems, and — crucially — <b>post-exertional malaise (PEM)</b>: a delayed worsening of symptoms after exertion."},
     {t:"What happens during exercise", b:"PEM is the defining feature. Pushing beyond capacity causes <b>crashes</b> and can worsen the condition. Current best practice is <b>pacing</b> — staying within the 'energy envelope' — NOT graded exercise aimed at steadily increasing load. This is different from ordinary deconditioning; don't just 'push through'."},
     {t:"Key considerations", b:"Use <b>activity management / pacing</b>; heart-rate ceilings can help cap effort. Rest is legitimate, and symptoms fluctuate. The goal is avoiding boom-bust crashes, not chasing progression."},
     {t:"Safety & red flags", b:"A crash after activity means you exceeded the envelope → reduce. Screen for other treatable causes of fatigue. Don't impose progressive exercise targets."},
     {t:"Starting dose & progression", b:"Pace within tolerance with gentle, symptom-titrated movement. Progress only if PEM-free, and very cautiously. Consistency and avoiding crashes beat progression."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"The defining feature of ME/CFS for exercise is:",
      options:["Joint stiffness","Post-exertional malaise (a delayed crash)","High blood pressure","Muscle cramps"], answer:1, explain:"PEM — delayed symptom worsening after exertion — defines the approach."},
     {type:"mc", kind:"Check", q:"Best-practice exercise approach in ME/CFS is:",
      options:["Graded exercise to steadily increase load","Pacing within the energy envelope","Daily HIIT","Push through the fatigue"], answer:1, explain:"Pace within tolerance; avoid graded push that provokes crashes."},
     {type:"mc", kind:"Check", q:"A crash after a session means you should:",
      options:["Push harder next time","Reduce — you exceeded the envelope","Ignore it","Add intensity"], answer:1, explain:"A crash signals you went too far — pull back and pace."},
   ]},
 { id:"epilepsy", name:"Epilepsy", icon:"⚡", color:"var(--gold)", shadow:"var(--gold-d)",
   cards:[
     {t:"What it is", b:"A tendency to recurrent seizures from abnormal brain electrical activity. Exercise is generally <b>safe and beneficial</b>, rarely triggers seizures, and can improve seizure control and wellbeing."},
     {t:"What happens during exercise", b:"Most people exercise normally. A minority have specific triggers — extreme fatigue, hyperventilation, flashing lights, hypoglycaemia, overheating, poor sleep — so manage those. Some anticonvulsants cause drowsiness or affect balance and bone."},
     {t:"Key considerations", b:"The main planning issue is <b>environmental safety</b>: avoid solo swimming, heights/climbing, and activities where a seizure mid-task would be dangerous, and have a supervision / first-aid plan. Support good sleep, hydration and regular meals."},
     {t:"Safety & red flags", b:"For a seizure: protect from injury, don't restrain, recovery position afterwards, and time it — <b>over 5 minutes or repeated → 000</b>. Poorly controlled epilepsy → discuss suitable activities with the team."},
     {t:"Starting dose & progression", b:"Prescribe as for the general population, with attention to environment and individual triggers. Progress as normal."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"Exercise in well-controlled epilepsy is:",
      options:["Dangerous — avoid it","Generally safe and beneficial; rarely triggers seizures","Only allowed in hospital","Banned"], answer:1, explain:"Exercise is safe and beneficial and rarely provokes seizures."},
     {type:"mc", kind:"Check", q:"The main planning consideration is:",
      options:["Avoiding all sweat","Environmental safety (e.g. no solo swimming/heights)","Never raising heart rate","Avoiding strength work"], answer:1, explain:"Plan the environment so a seizure mid-task wouldn't be dangerous."},
     {type:"mc", kind:"Check", q:"A seizure lasting over 5 minutes means:",
      options:["Wait it out","Call 000","Restrain them","Give water"], answer:1, explain:"Protect from injury, recovery position, time it; >5 min or repeated → 000."},
   ]},
 { id:"idd", name:"Intellectual Disability", icon:"🤝", color:"var(--purple)", shadow:"var(--purple-d)",
   cards:[
     {t:"What it is", b:"Lifelong conditions (e.g. Down syndrome, autism, conditions associated with cerebral palsy) affecting learning, communication and/or development. Exercise improves health, function and participation — and people with intellectual disability are often very inactive."},
     {t:"What happens during exercise", b:"Baseline fitness is often lower, and communication/learning differences shape delivery. Use <b>clear, simple instructions, demonstration/modelling, routine, visual supports</b> and positive reinforcement."},
     {t:"Key considerations", b:"Mind condition-specific issues. In <b>Down syndrome</b>: screen for <b>atlantoaxial instability</b> (avoid forced neck flexion/contact until cleared), and note higher rates of cardiac, thyroid and obesity issues plus a lower max heart rate. In cerebral palsy: spasticity and contractures. Tailor it and keep it enjoyable."},
     {t:"Safety & red flags", b:"Watch condition-specific flags (e.g. neck symptoms in Down syndrome → review) and cardiac comorbidity, and read behavioural cues for distress."},
     {t:"Starting dose & progression", b:"Meet people where they are: simple, structured and enjoyable, progressing through repetition. Involve carers and support workers."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"Best delivery approach for clients with intellectual disability?",
      options:["Long written programs","Clear simple cues, demonstration, routine, visual supports","Minimal instruction","Adult elite programming"], answer:1, explain:"Simple, demonstrated, routine-based delivery with visual supports works best."},
     {type:"mc", kind:"Check", q:"In Down syndrome, you should screen for:",
      options:["Atlantoaxial instability (neck)","Flat feet only","Colour blindness","Nothing"], answer:0, explain:"Screen for atlantoaxial instability; avoid forced neck flexion/contact until cleared."},
     {type:"mc", kind:"Check", q:"People with intellectual disability are often:",
      options:["Over-exercised","Very inactive — so they benefit greatly","Unable to exercise","Elite athletes"], answer:1, explain:"This group is often highly inactive, so accessible exercise brings big benefits."},
   ]},
 { id:"postnatal", name:"Postpartum", icon:"👶", color:"var(--green)", shadow:"var(--green-d)",
   cards:[
     {t:"What it is", b:"The period after birth. Exercise supports recovery, mood (it reduces postnatal depression), fitness, and <b>pelvic-floor and core</b> function. Return to exercise is gradual and individualised."},
     {t:"What happens during exercise", b:"Tissues are recovering and the <b>pelvic floor and abdominal wall</b> need rebuilding. Check for <b>diastasis recti</b> (abdominal separation). Relaxin effects linger, and breastfeeding and broken sleep affect energy."},
     {t:"Key considerations", b:"Typically start gentle early (walking, pelvic-floor, breathing), then progress to strength and higher impact gradually — usually after the ~6-week check and ideally with pelvic-health physio guidance, especially before <b>running / high-impact</b>."},
     {t:"Safety & red flags", b:"Heavy bleeding, pain, signs of infection, or pelvic-floor symptoms (<b>leaking, heaviness/dragging</b>) → review / pelvic-health physio. After a caesarean, respect wound healing."},
     {t:"Starting dose & progression", b:"Pelvic-floor + core + walking first; graded return to strength, then impact. Let symptoms — and the 6-week check / physio clearance — guide the pace."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"Early postpartum exercise should focus on:",
      options:["Heavy lifting and sprinting","Pelvic-floor, core and walking","Max-effort HIIT","Contact sport"], answer:1, explain:"Rebuild pelvic floor and core, with gentle walking, before progressing."},
     {type:"mc", kind:"Check", q:"High-impact/running is best added:",
      options:["Day 2 after birth","After clearance (~6-week check / pelvic-health physio)","Never","Only in week 1"], answer:1, explain:"Delay high-impact until cleared and the pelvic floor is rebuilt."},
     {type:"mc", kind:"Check", q:"Leaking or a heaviness/dragging sensation means:",
      options:["Push through","Refer to pelvic-health physio","Add jumping","Ignore it"], answer:1, explain:"Pelvic-floor symptoms (incontinence, prolapse signs) → refer."},
   ]},
 { id:"transplant", name:"Organ Transplant", icon:"🧬", color:"var(--blue)", shadow:"var(--blue-d)",
   cards:[
     {t:"What it is", b:"After a solid-organ transplant (kidney, heart, liver, lung), exercise is safe and important — it counters the deconditioning of chronic illness and the side effects of immunosuppression."},
     {t:"What happens during exercise", b:"Expect pre-transplant deconditioning plus medication effects. A transplanted <b>heart is denervated</b>, so its HR response is blunted and slow → use a longer warm-up/cool-down and <b>RPE</b>. <b>Immunosuppressants</b> can cause muscle wasting, bone loss, weight gain, diabetes and hypertension."},
     {t:"Key considerations", b:"<b>Infection control</b> matters (immunosuppressed — avoid sick contacts and crowded germy settings, good hygiene), plus sun protection (skin-cancer risk), bone health, and gradual progression. Avoid heavy loading over a fresh surgical site early on."},
     {t:"Safety & red flags", b:"Signs of <b>infection</b> (fever) or <b>rejection</b> (unusual fatigue, fluid retention, breathlessness) → urgent review. Manage cardiovascular risk."},
     {t:"Starting dose & progression", b:"Aerobic + resistance at moderate intensity, building gradually; use RPE for heart-transplant clients and stay infection-aware. Progress as tolerated."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"A heart-transplant recipient's intensity is best set by:",
      options:["Target heart rate","RPE — the heart is denervated, with a blunted HR response","Max HR test","Sprint pace"], answer:1, explain:"The denervated heart responds slowly — use RPE plus a longer warm-up/cool-down."},
     {type:"mc", kind:"Check", q:"Because of immunosuppression, you should:",
      options:["Train in crowded germy gyms","Take infection precautions (avoid sick contacts, hygiene)","Ignore hygiene","Skip resistance work"], answer:1, explain:"Immunosuppressed clients need infection precautions, plus bone/muscle/metabolic care."},
     {type:"mc", kind:"Check", q:"Unusual fatigue, fluid retention and breathlessness could signal:",
      options:["Good adaptation","Rejection or infection → urgent review","Normal soreness","Dehydration only"], answer:1, explain:"These can indicate rejection/infection → urgent medical review."},
   ]},
 { id:"hiv", name:"HIV", icon:"➕", color:"var(--red)", shadow:"var(--red-d)",
   cards:[
     {t:"What it is", b:"With modern antiretroviral therapy (ART), HIV is a chronic, manageable condition. Exercise improves fitness, strength and mental health, and helps manage the cardiometabolic and body-composition effects of HIV/ART."},
     {t:"What happens during exercise", b:"Most people on stable ART exercise normally and benefit like anyone else. Some carry <b>elevated cardiovascular and metabolic risk</b> and altered body composition (lipodystrophy). Advanced or uncontrolled disease warrants more caution and brings more fatigue."},
     {t:"Key considerations", b:"HIV is <b>not transmitted</b> through normal exercise or sweat contact — standard hygiene is all that's needed. Focus on cardiovascular/metabolic risk, and use resistance training to support muscle. If significantly immunocompromised, be infection-aware."},
     {t:"Safety & red flags", b:"In advanced disease, watch for fatigue and infection and manage comorbidities. Otherwise treat as a healthy adult with attention to cardiovascular risk."},
     {t:"Starting dose & progression", b:"Aerobic + resistance as for the general population, progressing normally, with an emphasis on cardiovascular and metabolic health."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"For someone on stable ART, exercise is:",
      options:["Unsafe","As for the general population — safe and beneficial","Limited to walking","Banned"], answer:1, explain:"On stable ART, prescribe and progress as for the general population."},
     {type:"mc", kind:"Check", q:"Can HIV be transmitted through normal exercise or sweat?",
      options:["Yes, easily","No — standard hygiene is sufficient","Only via weights","Only in pools"], answer:1, explain:"HIV isn't transmitted through normal exercise/sweat contact; use standard hygiene."},
     {type:"mc", kind:"Check", q:"A key focus area in HIV exercise is:",
      options:["Cardiovascular & metabolic risk","Flexibility only","Avoiding all strength work","Breath-holding"], answer:0, explain:"Address elevated CV/metabolic risk and body-composition changes; resistance training helps."},
   ]},
 { id:"bariatric", name:"Bariatric Surgery", icon:"🍽️", color:"var(--teal)", shadow:"var(--teal-d)",
   cards:[
     {t:"What it is", b:"Weight-loss surgery (e.g. gastric sleeve or bypass) for severe obesity. Exercise supports weight loss, <b>preserves muscle</b> during rapid loss, and improves long-term outcomes and weight maintenance."},
     {t:"What happens during exercise", b:"Rapid weight loss risks losing muscle as well as fat, so <b>resistance training to preserve lean mass</b> is key. Capacity is low early on, and the surgical site needs protecting. Joint loads ease as weight drops."},
     {t:"Key considerations", b:"Nutrition is very altered — small volumes, protein priority, risk of <b>dumping syndrome</b>, dehydration and micronutrient deficiencies (watch fatigue/anaemia). Stage activity per the surgical protocol: gentle early, progressing over weeks."},
     {t:"Safety & red flags", b:"Early wound/site pain, dehydration, or dizziness (dumping / low intake) → caution and review. Follow the surgical team's timeline."},
     {t:"Starting dose & progression", b:"Early walking, then <b>progressive resistance</b> to preserve muscle plus aerobic for fitness. Build as healing and capacity allow."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"A priority after bariatric surgery is:",
      options:["Maximal cardio only","Resistance training to preserve muscle during rapid loss","Avoiding all exercise","Heavy lifting day 1"], answer:1, explain:"Resistance training preserves lean mass during rapid weight loss."},
     {type:"mc", kind:"Check", q:"Early activity should be:",
      options:["Unrestricted","Staged per the surgical protocol — gentle, then progress","Maximal effort","Skipped entirely"], answer:1, explain:"Follow the surgical timeline: gentle early, progressing over weeks."},
     {type:"mc", kind:"Check", q:"Which nutrition issue is relevant?",
      options:["None","Dumping, dehydration & deficiencies — prioritise protein/hydration","Eating more sugar","Skipping protein"], answer:1, explain:"Altered intake means watching hydration, protein and deficiencies."},
   ]},
 { id:"neuropathy", name:"Peripheral Neuropathy", icon:"🧦", color:"var(--gold)", shadow:"var(--gold-d)",
   cards:[
     {t:"What it is", b:"Damage to peripheral nerves (commonly from diabetes, chemotherapy, alcohol or B12 deficiency) causing numbness, tingling, pain, weakness and impaired balance/proprioception — usually in the feet and hands."},
     {t:"What happens during exercise", b:"<b>Impaired sensation</b> raises balance and falls risk, and means clients can't feel foot injuries. Exercise — including balance and strength work — can improve function and stability and may ease symptoms."},
     {t:"Key considerations", b:"Prioritise <b>foot care and footwear</b> (check skin for unfelt blisters/injuries), favour balance training with support, and consider non-weight-bearing options (bike, seated) if there's ulcer risk. Watch for autonomic neuropathy (orthostatic BP/HR)."},
     {t:"Safety & red flags", b:"An unfelt foot wound/ulcer → offload and refer. Watch for orthostatic symptoms and progressive weakness."},
     {t:"Starting dose & progression", b:"Balance + strength + aerobic, protecting the feet. Progress balance complexity carefully and with support."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"The main exercise risk with peripheral neuropathy is:",
      options:["Too much flexibility","Impaired balance/falls and unfelt foot injuries","Overhydration","High heart rate"], answer:1, explain:"Lost sensation raises falls risk and hides foot injuries."},
     {type:"mc", kind:"Check", q:"Every session you should:",
      options:["Skip footwear checks","Check the feet and footwear","Avoid balance work","Only do cardio"], answer:1, explain:"Inspect feet/footwear — clients can't feel developing injuries."},
     {type:"mc", kind:"Check", q:"Balance training in neuropathy is:",
      options:["Pointless","Valuable — done with support to improve stability","Dangerous, avoid it","Only for athletes"], answer:1, explain:"Supported balance training improves stability and reduces falls."},
   ]},
 { id:"menopause", name:"Menopause", icon:"♀️", color:"var(--purple)", shadow:"var(--purple-d)",
   cards:[
     {t:"What it is", b:"The natural end of menstrual cycles. Falling oestrogen brings hot flushes, sleep disruption and mood changes, plus accelerated loss of <b>bone and muscle</b>, shifts in fat distribution, and rising cardiovascular risk. Exercise targets all of these."},
     {t:"What happens during exercise", b:"Because bone and muscle loss accelerate, <b>resistance plus weight-bearing/impact</b> training is protective. Aerobic exercise helps cardiometabolic risk and mood, and many find activity eases symptoms — manage heat and flushes."},
     {t:"Key considerations", b:"Prioritise <b>progressive resistance + impact</b> for bone, alongside aerobic work and pelvic-floor training. Treat strength building as a long-term investment against osteoporosis and sarcopenia; support sleep and stress."},
     {t:"Safety & red flags", b:"Apply the usual cardiac/BP screening; new or unusual symptoms warrant review."},
     {t:"Starting dose & progression", b:"Resistance 2–3×/week + weight-bearing/impact + aerobic. Progress the load to protect bone and muscle over the years ahead."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"Falling oestrogen at menopause accelerates:",
      options:["Bone and muscle loss","Bone gain","Nothing","Only weight loss"], answer:0, explain:"Oestrogen decline speeds loss of bone and muscle — exercise protects both."},
     {type:"mc", kind:"Check", q:"Most protective exercise for menopausal bone is:",
      options:["Gentle stretching","Progressive resistance + weight-bearing/impact","Swimming only","Rest"], answer:1, explain:"Resistance plus impact loading protect bone (and muscle)."},
     {type:"mc", kind:"Check", q:"Aerobic exercise around menopause mainly helps:",
      options:["Nothing","Cardiometabolic risk and mood","Only flexibility","Grip strength"], answer:1, explain:"Aerobic work targets cardiovascular/metabolic risk and mood."},
   ]},
 { id:"thyroid", name:"Thyroid Disorders", icon:"🦋", color:"var(--green)", shadow:"var(--green-d)",
   cards:[
     {t:"What it is", b:"<b>Hypothyroidism</b> (underactive — fatigue, weight gain, cold intolerance, slow HR, muscle aches) or <b>hyperthyroidism</b> (overactive — rapid HR, heat intolerance, weight loss, tremor, anxiety). Once treated and stable, exercise is normal and beneficial."},
     {t:"What happens during exercise", b:"<b>Untreated or unstable</b> disease alters tolerance and heart rate, so defer hard exercise until stabilised. Hypothyroid clients tire easily with possible muscle/joint aches; hyperthyroid clients have tachycardia, heat intolerance and arrhythmia risk."},
     {t:"Key considerations", b:"Ensure the condition is medically managed. Heart rate is unreliable while unstable (low in hypo, high in hyper) → use <b>RPE</b>. With hyperthyroidism, be cautious with intensity until controlled (cardiac strain)."},
     {t:"Safety & red flags", b:"Untreated hyperthyroidism with palpitations/arrhythmia → get it medically controlled first. Watch for severe hypothyroid symptoms."},
     {t:"Starting dose & progression", b:"Once stable, prescribe normally. While symptomatic/unstable, keep it light and use RPE, progressing as control improves."},
   ],
   qs:[
     {type:"mc", kind:"Check", q:"Exercise is normal and beneficial when thyroid disease is:",
      options:["Untreated","Treated and stable","Severe","Ignored"], answer:1, explain:"Once treated/stable, exercise is normal; defer hard work while unstable."},
     {type:"mc", kind:"Check", q:"While the thyroid is unstable, gauge intensity with:",
      options:["Heart rate","RPE — HR is unreliable","Max HR test","Pace only"], answer:1, explain:"HR is low in hypo and high in hyper — use RPE while unstable."},
     {type:"mc", kind:"Check", q:"With uncontrolled hyperthyroidism you should:",
      options:["Do high-intensity intervals","Be cautious with intensity until controlled","Ignore the heart rate","Add maximal lifts"], answer:1, explain:"Tachycardia/arrhythmia risk — limit intensity until medically controlled."},
   ]},
