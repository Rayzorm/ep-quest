/* ============================================================
   State / persistence
   ============================================================ */
const SKEY='ep-quest-v1';
let S = load();
function load(){
  try{ return JSON.parse(localStorage.getItem(SKEY)) || fresh(); }catch(e){ return fresh(); }
}
function fresh(){ return { xp:0, streak:0, maxStreak:0, lastDay:null, done:{}, crowns:{}, flawless:0, dayXp:0, dayXpDate:null, answered:0, correctCount:0, missed:{} }; } // done["u-l"]=true, crowns key=count
function save(){ localStorage.setItem(SKEY, JSON.stringify(S)); }

function lvl(){ return Math.floor(S.xp/60)+1; }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
function yesterdayStr(){ const d=new Date(Date.now()-864e5); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }

function refreshHud(){
  hudStreak.textContent=S.streak;
  hudXp.textContent=S.xp;
  hudLvl.textContent='Level '+lvl();
}

/* ============================================================
   Home / path render
   ============================================================ */
const home=document.getElementById('home');
function unlocked(u,l){
  if(u===0&&l===0) return true;
  // unlocked if previous lesson done
  let flat=[]; UNITS.forEach((U,ui)=>U.lessons.forEach((L,li)=>flat.push(ui+'-'+li)));
  const key=u+'-'+l; const idx=flat.indexOf(key);
  if(idx<=0) return true;
  return !!S.done[flat[idx-1]];
}
function renderHome(){
  refreshHud();
  home.innerHTML='';
  UNITS.forEach((U,ui)=>{
    const head=document.createElement('div');
    head.className='unit-head';
    head.style.background=U.color; head.style.boxShadow='0 4px 0 '+U.shadow;
    head.innerHTML=`<h2>${U.icon} ${U.title}</h2><p>${U.sub}</p>`;
    home.appendChild(head);
    const path=document.createElement('div'); path.className='path';
    U.lessons.forEach((L,li)=>{
      const key=ui+'-'+li;
      const isDone=!!S.done[key];
      const open=unlocked(ui,li);
      const crowns=S.crowns[key]||0;
      const node=document.createElement('button');
      node.className='node'+(open?'':' locked');
      node.style.setProperty('--nd', open? U.shadow : 'var(--line2)');
      const showStart = open && !isDone;
      node.innerHTML=`
        ${crowns>0?`<div class="crown">${'👑'.repeat(Math.min(crowns,1))}</div>`:''}
        ${showStart?`<div class="start-pop">START</div>`:''}
        <div class="disc" style="${open?`background:${isDone?U.color:'var(--card)'};color:${isDone?'#fff':U.color};border:${isDone?'none':'3px solid '+U.color}`:''}">
          ${open? (isDone?'✓':L.icon) : '🔒'}
        </div>`;
      if(open) node.onclick=()=>startLesson(ui,li);
      path.appendChild(node);
    });
    home.appendChild(path);
  });
}

/* ============================================================
   Lesson player
   ============================================================ */
let cur=null; // {ui,li,qs,i,hearts,wrong,total,locked,answered}
const player=document.getElementById('player');
const qarea=document.getElementById('qarea');
const foot=document.getElementById('foot');
let checkBtn=document.getElementById('checkBtn');
const barFill=document.getElementById('barFill');
const liveHearts=document.getElementById('liveHearts');

function startLesson(ui,li){
  beginLesson(UNITS[ui].lessons[li].qs.slice(), ui+'-'+li, 'quest');
}
function startCourse(ci){
  const c=LEARN[ci], steps=[];
  c.cards.forEach(card=>steps.push({type:'info', kind:c.name, title:card.t, body:card.b}));
  if(KEYNUM[c.id]) steps.push({type:'info', kind:c.name, accent:'key', title:'📊 Key numbers',
    body:'<ul class="keys">'+KEYNUM[c.id].map(k=>'<li>'+k+'</li>').join('')+'</ul>'});
  c.qs.forEach(q=>steps.push(q));
  beginLesson(steps, 'L'+ci, 'learn');
}
function beginLesson(steps, doneKey, mode){
  cur={steps, doneKey, mode, i:0, hearts:5, wrong:0, total:steps.length,
       scoredTotal:steps.filter(s=>s.type!=='info').length||1,
       sel:null, matchState:null, answered:false};
  player.classList.add('show');
  renderQ();
}
function advance(){
  cur.i++;
  if(cur.i>=cur.total) completeLesson(); else renderQ();
}
function quitLesson(){ if(confirm('Quit this lesson? Progress in it will be lost.')){ player.classList.remove('show'); } }

function renderQ(){
  cur.answered=false; cur.sel=null; cur.matchState=null;
  liveHearts.textContent=cur.hearts;
  barFill.style.width=((cur.i)/cur.total*100)+'%';
  const q=cur.steps[cur.i];
  // Teaching card (Learn mode): no scoring, no hearts — just read and continue
  if(q.type==='info'){
    const hs=q.accent==='key'?' style="background:var(--gold);color:#3a2e00"':'';
    qarea.innerHTML=`<div class="qkind">${q.kind||'Learn'}</div>`+
      `<div class="teach"><div class="teach-h"${hs}>${q.title}</div><div class="teach-b">${q.body}</div></div>`;
    qarea.scrollTop=0;
    foot.className='foot';
    foot.innerHTML='<button class="btn green" id="infoNext">Continue</button>';
    document.getElementById('infoNext').onclick=advance;
    return;
  }
  // rebuild the footer fresh — feedback replaces its innerHTML, so the old Check button is stale
  foot.className='foot';
  foot.innerHTML='<button class="btn gray" id="checkBtn" disabled>Check</button>';
  checkBtn=document.getElementById('checkBtn');
  checkBtn.disabled=true; checkBtn.onclick=onCheck;
  let html=`<div class="qkind">${q.kind||'Question'}</div>`;
  if(q.scn) html+=`<div class="qscn">${q.scn}</div>`;
  html+=`<div class="qtext">${q.q}</div>`;
  if(q.type==='mc'||q.type==='multi'){
    // shuffle the DISPLAY order; data-i keeps the original index so answer-checking is unchanged
    const order=q.options.map((_,i)=>i).sort(()=>Math.random()-0.5);
    html+=`<div class="opts" id="opts">`;
    order.forEach((origIdx,pos)=>{
      const k=String.fromCharCode(65+pos);
      html+=`<button class="opt" data-i="${origIdx}" onclick="pick(${origIdx})"><span class="key">${k}</span><span>${q.options[origIdx]}</span></button>`;
    });
    html+=`</div>`;
  } else if(q.type==='match'){
    // build shuffled right column
    const left=q.pairs.map((p,i)=>({t:p[0],i}));
    const right=q.pairs.map((p,i)=>({t:p[1],i})).sort(()=>Math.random()-.5);
    cur.matchState={left,right,sel:null,selSide:null,matched:{},rightOrder:right};
    html+=`<div class="match"><div class="col" id="mL"></div><div class="col" id="mR"></div></div>`;
    setTimeout(()=>{
      const L=document.getElementById('mL'), R=document.getElementById('mR');
      left.forEach(o=>{const b=document.createElement('button');b.className='mitem';b.textContent=o.t;b.dataset.i=o.i;b.dataset.side='L';b.onclick=()=>mpick('L',o.i,b);L.appendChild(b);});
      right.forEach(o=>{const b=document.createElement('button');b.className='mitem';b.textContent=o.t;b.dataset.i=o.i;b.dataset.side='R';b.onclick=()=>mpick('R',o.i,b);R.appendChild(b);});
    },0);
  }
  qarea.innerHTML=html;
  qarea.scrollTop=0;
}

function pick(idx){
  if(cur.answered) return;
  const q=cur.steps[cur.i];
  const opts=document.querySelectorAll('#opts .opt');
  if(q.type==='mc'){
    cur.sel=idx;
    opts.forEach(o=>o.classList.toggle('sel', +o.dataset.i===idx));
  } else { // multi
    if(!Array.isArray(cur.sel)) cur.sel=[];
    const at=cur.sel.indexOf(idx);
    if(at>=0) cur.sel.splice(at,1); else cur.sel.push(idx);
    opts.forEach(o=>o.classList.toggle('sel', cur.sel.includes(+o.dataset.i)));
  }
  const has = q.type==='mc' ? cur.sel!=null : (cur.sel&&cur.sel.length>0);
  enableCheck(has);
}

function mpick(side,i,btn){
  const ms=cur.matchState;
  if(ms.matched[side+i]) return;
  // toggle selection within constraints
  if(ms.sel==null){ ms.sel=i; ms.selSide=side; btn.classList.add('sel'); return; }
  if(ms.selSide===side){ // change selection same side
    document.querySelectorAll('#m'+side+' .mitem').forEach(b=>b.classList.remove('sel'));
    ms.sel=i; btn.classList.add('sel'); return;
  }
  // we have one from each side → check pair correctness for instant lock (Duolingo-style)
  const leftI = side==='L'? i : ms.sel;
  const rightI = side==='R'? i : ms.sel;
  if(leftI===rightI){
    // correct match
    ms.matched['L'+leftI]=true; ms.matched['R'+rightI]=true;
    document.querySelectorAll('.match .mitem').forEach(b=>{
      if(b.dataset.side==='L'&&+b.dataset.i===leftI) b.classList.add('done');
      if(b.dataset.side==='R'&&+b.dataset.i===rightI) b.classList.add('done');
      b.classList.remove('sel');
    });
    ding();
    ms.sel=null; ms.selSide=null;
    // all matched?
    if(Object.keys(ms.matched).length === cur.steps[cur.i].pairs.length*2){
      cur.sel='matched'; enableCheck(true);
    }
  } else {
    // wrong pair: flash and reset selection, no heart lost (forgiving matching)
    const wrongBtns=[...document.querySelectorAll('.match .mitem')].filter(b=>b.classList.contains('sel')||b===btn);
    btn.classList.add('sel');
    setTimeout(()=>{ document.querySelectorAll('.match .mitem.sel').forEach(b=>b.classList.remove('sel')); },350);
    ms.sel=null; ms.selSide=null;
  }
}

function enableCheck(on){
  if(on){ checkBtn.className='btn green'; checkBtn.disabled=false; }
  else { checkBtn.className='btn gray'; checkBtn.disabled=true; }
}

function onCheck(){
  if(cur.answered) return;       // block double-check
  const q=cur.steps[cur.i];
  let correct=false;
  if(q.type==='mc'){
    correct = cur.sel===q.answer;
    document.querySelectorAll('#opts .opt').forEach(o=>{
      const i=+o.dataset.i;
      if(i===q.answer) o.classList.add('correct');
      else if(i===cur.sel) o.classList.add('wrong');
      else o.classList.add('dim');
      o.onclick=null;
    });
  } else if(q.type==='multi'){
    const sel=[...(cur.sel||[])].sort().join(',');
    const ans=[...q.answers].sort().join(',');
    correct = sel===ans;
    document.querySelectorAll('#opts .opt').forEach(o=>{
      const i=+o.dataset.i;
      if(q.answers.includes(i)) o.classList.add('correct');
      else if((cur.sel||[]).includes(i)) o.classList.add('wrong');
      else o.classList.add('dim');
      o.onclick=null;
    });
  } else if(q.type==='match'){
    correct=true; // matching only completes when all correct
  }
  // track stats + missed questions (spaced-repetition lite)
  if(q.type==='mc'||q.type==='multi'){
    S.answered=(S.answered||0)+1;
    const id=q.q;
    if(correct){ S.correctCount=(S.correctCount||0)+1; if(S.missed&&S.missed[id]) delete S.missed[id]; }
    else { S.missed=S.missed||{}; S.missed[id]=true; }
    save();
  }
  cur.answered=true;
  showFeedback(correct, q.explain);
}

function showFeedback(correct, explain){
  if(correct){ ding(); }
  else { cur.wrong++; cur.hearts--; liveHearts.textContent=cur.hearts; buzz(); }
  foot.className='foot '+(correct?'ok':'bad');
  foot.innerHTML=`
    <div class="fb">
      <div class="badge">${correct?'✓':'✕'}</div>
      <div class="txt"><b>${correct?pickPraise():'Not quite'}</b><span>${explain||''}</span></div>
    </div>
    <button class="btn ${correct?'green':'red'}" id="contBtn">Continue</button>`;
  const cb=document.getElementById('contBtn');
  cb.onclick=()=>{
    cb.onclick=null;             // one-shot: can't spam Continue to skip ahead
    if(cur.hearts<=0){ failLesson(); return; }
    advance();
  };
}
const PRAISE=["Nice!","Correct!","You got it!","Sharp!","Exactly 👏","Clinical!"];
function pickPraise(){ return PRAISE[Math.random()*PRAISE.length|0]; }

function failLesson(){
  player.classList.remove('show');
  toast("💔 Out of hearts — give it another go!");
}

function completeLesson(){
  barFill.style.width='100%';
  const key=cur.doneKey;
  const firstTime=!S.done[key];
  if(key!=='practice'){ S.done[key]=true; S.crowns[key]=(S.crowns[key]||0)+1; }
  // XP — accuracy is over scored questions only (teaching cards don't count)
  const acc=Math.round((cur.scoredTotal-cur.wrong)/cur.scoredTotal*100);
  let gained = firstTime?15:6;
  if(cur.wrong===0){ gained+=5; S.flawless=(S.flawless||0)+1; }
  S.xp+=gained;
  // daily XP goal + streak
  const t=todayStr();
  if(S.dayXpDate!==t){ S.dayXp=0; S.dayXpDate=t; }
  S.dayXp=(S.dayXp||0)+gained;
  if(S.lastDay!==t){
    if(S.lastDay===yesterdayStr()) S.streak++;
    else S.streak=1;
    S.lastDay=t;
  }
  S.maxStreak=Math.max(S.maxStreak||0,S.streak);
  save();
  // show done screen
  player.classList.remove('show');
  document.getElementById('rwStreak').textContent=S.streak;
  document.getElementById('rwXp').textContent=S.xp;
  document.getElementById('rwAcc').textContent=acc+'%';
  document.getElementById('doneSub').textContent = cur.wrong===0 ? "Flawless — that's the reflex firing." : "Solid rep. Onward.";
  document.getElementById('done').classList.add('show');
  fanfare();
  confettiBurst();
}
function closeDone(){
  document.getElementById('done').classList.remove('show');
  if(cur && cur.mode==='learn') renderLearn();
  else if(cur && cur.mode==='you') renderProfile();
  else renderHome();
  window.scrollTo({top:0});
}

/* ---- fx ---- */
let actx=null;
function audioReady(){ try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); }catch(e){} }
// AudioContext starts suspended under autoplay policy — resume on the first gesture
document.addEventListener('pointerdown',audioReady);
document.addEventListener('keydown',audioReady);
function tone(freq,type,dur,when,vol){ if(!actx) return; when=when||0; vol=vol||.18;
  const t0=actx.currentTime+when, o=actx.createOscillator(), g=actx.createGain();
  o.type=type; o.frequency.value=freq; o.connect(g); g.connect(actx.destination);
  g.gain.setValueAtTime(.0001,t0); g.gain.exponentialRampToValueAtTime(vol,t0+.012);
  g.gain.exponentialRampToValueAtTime(.0001,t0+dur); o.start(t0); o.stop(t0+dur+.03); }
function ding(){ audioReady(); tone(659,'sine',.13,0,.16); tone(880,'sine',.14,.07,.16); tone(1319,'sine',.20,.15,.13); }
function buzz(){ audioReady(); tone(200,'square',.18,0,.14); tone(150,'square',.22,.09,.12); }
function fanfare(){ audioReady(); [523,659,784,1047].forEach((f,i)=>tone(f,'triangle',.28,i*.12,.16)); }

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

function confettiBurst(){
  const colors=['#58cc02','#1cb0f6','#ffc800','#ce82ff','#ff4b4b','#00cd9c'];
  for(let i=0;i<70;i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.left=Math.random()*100+'%';
    c.style.background=colors[i%colors.length];
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    const dx=(Math.random()-.5)*240, dur=1400+Math.random()*1200, rot=Math.random()*720;
    c.animate([{transform:`translate(0,0) rotate(0deg)`,opacity:1},
               {transform:`translate(${dx}px,${window.innerHeight+60}px) rotate(${rot}deg)`,opacity:1}],
              {duration:dur,easing:'cubic-bezier(.2,.6,.5,1)'});
    setTimeout(()=>c.remove(),dur);
  }
}

/* keyboard: 1-9 select, Enter check/continue */
document.addEventListener('keydown',e=>{
  if(!player.classList.contains('show')) return;
  if(/[1-9]/.test(e.key)){ const i=+e.key-1; const opts=document.querySelectorAll('#opts .opt'); if(opts[i]) opts[i].click(); }
  if(e.key==='Enter'){ const cb=document.getElementById('contBtn')||document.getElementById('infoNext'); if(cb) cb.click(); else if(checkBtn&&!checkBtn.disabled) checkBtn.click(); }
});

function showTab(t){
  const map={quest:'home',learn:'learn',you:'you'};
  ['home','learn','you'].forEach(id=>document.getElementById(id).style.display=(id===map[t])?'':'none');
  document.getElementById('navQuest').classList.toggle('on',t==='quest');
  document.getElementById('navLearn').classList.toggle('on',t==='learn');
  document.getElementById('navYou').classList.toggle('on',t==='you');
  if(t==='quest') renderHome(); else if(t==='learn') renderLearn(); else renderProfile();
  window.scrollTo({top:0});
}
function renderLearn(){
  refreshHud();
  const host=document.getElementById('learn');
  host.innerHTML='<div class="learn-intro">📚 Condition Library<span>Short lessons on each condition — what it is, how it changes the exercise response, the meds that matter, the red flags, and how to start &amp; progress. Read the cards, then a quick check.</span></div>';
  const grid=document.createElement('div'); grid.className='cgrid';
  LEARN.forEach((c,i)=>{
    const done=!!S.done['L'+i];
    const b=document.createElement('button'); b.className='ctile';
    b.style.setProperty('--cc',c.color); b.style.setProperty('--cs',c.shadow);
    b.innerHTML=`<div class="cic">${c.icon}</div><div class="cname">${c.name}</div><div class="cmeta">${c.cards.length} cards · ${c.qs.length} Q${done?' · ✓':''}</div>`;
    b.onclick=()=>startCourse(i);
    grid.appendChild(b);
  });
  host.appendChild(grid);
}
/* ---- Profile / achievements / practice ---- */
function doneCount(){ return Object.keys(S.done).filter(k=>S.done[k]&&k!=='practice').length; }
function learnCount(){ return LEARN.filter((c,i)=>S.done['L'+i]).length; }
function unitDone(ui){ return UNITS[ui].lessons.every((l,li)=>S.done[ui+'-'+li]); }
function questDoneCount(){ return UNITS.reduce((a,u,ui)=>a+u.lessons.filter((l,li)=>S.done[ui+'-'+li]).length,0); }
function questTotalCount(){ return UNITS.reduce((a,u)=>a+u.lessons.length,0); }
const ACH=[
 {ic:'🎯',n:'First Steps',d:'Finish your first lesson',t:()=>doneCount()>=1},
 {ic:'✨',n:'Flawless',d:'Finish a lesson with no mistakes',t:()=>(S.flawless||0)>=1},
 {ic:'🔥',n:'Warming Up',d:'Reach a 3-day streak',t:()=>(S.maxStreak||0)>=3},
 {ic:'🗓️',n:'Week Warrior',d:'Reach a 7-day streak',t:()=>(S.maxStreak||0)>=7},
 {ic:'💎',n:'Century',d:'Earn 100 XP',t:()=>S.xp>=100},
 {ic:'👑',n:'High Roller',d:'Earn 500 XP',t:()=>S.xp>=500},
 {ic:'🚨',n:'Safety First',d:'Clear the Red Flags unit',t:()=>unitDone(1)},
 {ic:'📚',n:'Scholar',d:'Complete 5 conditions',t:()=>learnCount()>=5},
 {ic:'🎓',n:'Professor',d:'Complete every condition',t:()=>learnCount()>=LEARN.length},
 {ic:'🏆',n:'Grandmaster',d:'Finish every Quest lesson',t:()=>questDoneCount()>=questTotalCount()},
 {ic:'🧠',n:'Brainiac',d:'Answer 100 questions',t:()=>(S.answered||0)>=100},
 {ic:'💯',n:'Sharpshooter',d:'Answer 50 correctly',t:()=>(S.correctCount||0)>=50},
];
function renderProfile(){
  refreshHud();
  const host=document.getElementById('you');
  const need=60, into=S.xp%60, lvlNow=lvl();
  const goal=30, today=(S.dayXpDate===todayStr())?(S.dayXp||0):0;
  const earned=ACH.filter(a=>a.t()).length;
  const missedN=Object.keys(S.missed||{}).length;
  let html=`
    <div class="prof-top">
      <div class="prof-lvl">${lvlNow}</div>
      <div class="prof-meta"><b>Level ${lvlNow}</b>
        <div class="xpbar"><div class="xpfill" style="width:${into/need*100}%"></div></div>
        <span>${into} / ${need} XP to level ${lvlNow+1}</span></div>
    </div>
    <div class="goal">🎯 Daily goal <b>${Math.min(today,goal)}/${goal} XP</b>
      <div class="goalbar"><div class="goalfill" style="width:${Math.min(today/goal*100,100)}%"></div></div></div>
    <div class="statrow">
      <div class="stat2"><b>🔥 ${S.streak}</b><span>Streak</span></div>
      <div class="stat2"><b>💎 ${S.xp}</b><span>Total XP</span></div>
      <div class="stat2"><b>📘 ${questDoneCount()}/${questTotalCount()}</b><span>Quest</span></div>
      <div class="stat2"><b>📚 ${learnCount()}/${LEARN.length}</b><span>Conditions</span></div>
    </div>
    <button class="btn blue" style="margin:6px 16px 4px;width:calc(100% - 32px)" onclick="startPractice()">⚡ Quick Practice — 7 mixed questions</button>
    ${missedN?`<button class="btn red" style="margin:0 16px 4px;width:calc(100% - 32px)" onclick="startReview()">🔁 Review your misses (${missedN})</button>`:''}
    <div class="ach-h">🏅 Achievements <span>${earned}/${ACH.length}</span></div>
    <div class="achgrid">`;
  ACH.forEach(a=>{ const got=a.t(); html+=`<div class="ach ${got?'got':''}"><div class="ach-ic">${got?a.ic:'🔒'}</div><div class="ach-n">${a.n}</div><div class="ach-d">${a.d}</div></div>`; });
  html+=`</div>`;
  host.innerHTML=html;
}
function allScored(){
  let pool=[];
  UNITS.forEach(u=>u.lessons.forEach(l=>l.qs.forEach(q=>{ if(q.type!=='info') pool.push(q); })));
  LEARN.forEach(c=>c.qs.forEach(q=>pool.push(q)));
  return pool;
}
function startPractice(){
  const pool=allScored().sort(()=>Math.random()-.5).slice(0,7);
  beginLesson(pool, 'practice', 'you');
}
function startReview(){
  const ids=S.missed||{};
  let pool=allScored().filter(q=>ids[q.q]);
  if(!pool.length){ toast('No misses to review — nice!'); return; }
  pool=pool.sort(()=>Math.random()-.5).slice(0,10);
  beginLesson(pool, 'practice', 'you');
}
showTab('quest');

if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
