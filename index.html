<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EP Quest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#58cc02">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>EP Quest — train your clinical brain</title>
<style>
  :root{
    --green:#58cc02; --green-d:#48a800; --greenbg:#d7ffb8;
    --blue:#1cb0f6; --blue-d:#1690c4;
    --purple:#ce82ff; --purple-d:#a560d0;
    --red:#ff4b4b; --red-d:#d63b3b; --redbg:#ffdfe0;
    --gold:#ffc800; --gold-d:#e6a700;
    --teal:#00cd9c; --teal-d:#00a37c;
    --ink:#3c3c3c; --muted:#777; --line:#e5e5e5; --line2:#d0d0d0;
    --bg:#fff; --card:#fff;
    --shadow-press:0 4px 0;
  }
  @media (prefers-color-scheme:dark){
    :root{ --ink:#e8eef2; --muted:#9bb0bf; --line:#33424f; --line2:#3d4f5e; --bg:#0f1722; --card:#16212e; }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:"Nunito",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;
    font-weight:700;
  }
  .app{max-width:480px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;position:relative}

  /* ---- Top HUD ---- */
  .hud{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;
    padding:14px 18px calc(14px) ;background:var(--bg);border-bottom:2px solid var(--line)}
  .hud .item{display:flex;align-items:center;gap:6px;font-size:17px;font-weight:800}
  .hud .item .ic{font-size:19px}
  .hud .flame{color:#ff9600}
  .hud .gem{color:var(--blue)}
  .hud .heart{color:var(--red)}
  .hud .spacer{flex:1}
  .hud .lvl{background:var(--greenbg);color:var(--green-d);font-size:13px;font-weight:800;
    padding:5px 11px;border-radius:999px}
  @media (prefers-color-scheme:dark){ .hud .lvl{background:#1d3a16} }

  /* ---- Path ---- */
  .scroll{flex:1;overflow-y:auto;padding-bottom:40px}
  .unit-head{margin:22px 16px 8px;border-radius:18px;padding:16px 20px;color:#fff;
    box-shadow:var(--shadow-press) rgba(0,0,0,.18);position:relative}
  .unit-head h2{margin:0;font-size:19px;font-weight:800;letter-spacing:.2px}
  .unit-head p{margin:3px 0 0;font-size:13px;font-weight:700;opacity:.92}
  .path{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 0 20px}
  .node{position:relative;width:74px;height:66px;border:none;background:transparent;cursor:pointer;padding:0}
  .node .disc{width:68px;height:62px;border-radius:50%;display:grid;place-items:center;
    font-size:28px;transition:transform .08s;box-shadow:var(--shadow-press) var(--nd,#bbb)}
  .node:active .disc{transform:translateY(3px);box-shadow:0 1px 0 var(--nd,#bbb)}
  .node.locked .disc{background:var(--line);color:#aaa;box-shadow:var(--shadow-press) var(--line2)}
  .node.locked{cursor:not-allowed}
  .node .crown{position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:15px;
    filter:drop-shadow(0 1px 0 rgba(0,0,0,.2))}
  .node .start-pop{position:absolute;top:-34px;left:50%;transform:translateX(-50%);
    background:var(--card);color:var(--green);border:2px solid var(--line);font-size:11px;font-weight:800;
    padding:4px 9px;border-radius:9px;letter-spacing:.5px;white-space:nowrap;animation:bob 1.1s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-4px)}}
  /* zig-zag */
  .path .node:nth-child(6n+2){margin-left:74px}
  .path .node:nth-child(6n+3){margin-left:104px}
  .path .node:nth-child(6n+4){margin-left:74px}
  .path .node:nth-child(6n+6){margin-left:-74px}
  .path .node:nth-child(6n+0){margin-left:-104px}

  /* ---- Lesson player ---- */
  .player{position:fixed;inset:0;background:var(--bg);z-index:50;display:none;flex-direction:column;max-width:480px;margin:0 auto}
  .player.show{display:flex}
  .ptop{display:flex;align-items:center;gap:14px;padding:16px 18px}
  .quit{font-size:24px;color:var(--muted);background:none;border:none;cursor:pointer;font-weight:800;line-height:1}
  .bar{flex:1;height:16px;background:var(--line);border-radius:999px;overflow:hidden}
  .bar .fill{height:100%;width:0;background:var(--green);border-radius:999px;transition:width .3s}
  .ptop .hearts{display:flex;align-items:center;gap:4px;color:var(--red);font-weight:800;font-size:17px}

  .qarea{flex:1;overflow-y:auto;padding:8px 20px 20px}
  .qkind{font-size:13px;font-weight:800;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin:10px 0 14px}
  .qtext{font-size:22px;font-weight:800;line-height:1.35;margin-bottom:8px}
  .qscn{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:13px 15px;
    font-size:15px;font-weight:700;line-height:1.5;margin:6px 0 18px;color:var(--ink)}
  .qscn .who{color:var(--blue);font-weight:800;font-size:12px;letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:4px}
  .qscn .hl{color:var(--ink);background:var(--gold);padding:0 3px;border-radius:4px}
  @media (prefers-color-scheme:dark){ .qscn .hl{background:#5a4a00;color:#ffe27a} }

  .opts{display:flex;flex-direction:column;gap:11px}
  .opt{display:flex;align-items:center;gap:12px;text-align:left;width:100%;
    background:var(--card);border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;
    padding:15px 16px;font-size:16px;font-weight:700;color:var(--ink);cursor:pointer;transition:.05s}
  .opt:active{transform:translateY(2px);border-bottom-width:2px}
  .opt .key{width:26px;height:26px;border-radius:7px;border:2px solid var(--line2);display:grid;place-items:center;
    font-size:13px;color:var(--muted);flex:none}
  .opt.sel{border-color:var(--blue);background:rgba(28,176,246,.10)}
  .opt.sel .key{border-color:var(--blue);color:var(--blue)}
  .opt.correct{border-color:var(--green);background:rgba(88,204,2,.13)}
  .opt.correct .key{border-color:var(--green);color:var(--green);background:var(--green);color:#fff}
  .opt.wrong{border-color:var(--red);background:rgba(255,75,75,.10)}
  .opt.wrong .key{border-color:var(--red);color:var(--red)}
  .opt.dim{opacity:.5}

  /* match */
  .match{display:flex;gap:12px}
  .match .col{flex:1;display:flex;flex-direction:column;gap:10px}
  .mitem{background:var(--card);border:2px solid var(--line);border-bottom-width:4px;border-radius:12px;
    padding:13px 12px;font-size:14px;font-weight:700;cursor:pointer;text-align:center;min-height:54px;
    display:flex;align-items:center;justify-content:center}
  .mitem.sel{border-color:var(--blue);background:rgba(28,176,246,.12)}
  .mitem.done{opacity:.35;pointer-events:none;border-color:var(--green)}

  /* ---- bottom check / feedback ---- */
  .foot{border-top:2px solid var(--line);padding:16px 20px calc(20px + env(safe-area-inset-bottom));transition:.2s}
  .btn{display:block;width:100%;border:none;border-radius:15px;padding:15px;font-size:16px;font-weight:800;
    letter-spacing:.6px;text-transform:uppercase;cursor:pointer;color:#fff;box-shadow:var(--shadow-press) var(--bd,#999)}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--bd,#999)}
  .btn.green{background:var(--green);--bd:var(--green-d)}
  .btn.gray{background:var(--line);color:#9a9a9a;--bd:var(--line2);cursor:default}
  .btn.gray:active{transform:none;box-shadow:var(--shadow-press) var(--line2)}
  .btn.red{background:var(--red);--bd:var(--red-d)}
  .foot.ok{background:var(--greenbg)} .foot.bad{background:var(--redbg)}
  @media (prefers-color-scheme:dark){ .foot.ok{background:#16301a} .foot.bad{background:#321618} }
  .fb{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
  .fb .badge{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-size:22px;flex:none}
  .foot.ok .fb .badge{background:var(--green);color:#fff}
  .foot.bad .fb .badge{background:var(--red);color:#fff}
  .fb .txt b{font-size:17px;display:block}
  .foot.ok .fb .txt b{color:var(--green-d)} .foot.bad .fb .txt b{color:var(--red-d)}
  .fb .txt span{font-size:14px;font-weight:700;color:var(--ink);line-height:1.45}
  @media (prefers-color-scheme:dark){ .foot.ok .fb .txt b{color:#9be861} }

  /* ---- complete screen ---- */
  .done{position:fixed;inset:0;z-index:60;background:var(--bg);display:none;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:30px;max-width:480px;margin:0 auto}
  .done.show{display:flex}
  .done .trophy{font-size:84px;animation:pop .5s cubic-bezier(.2,1.4,.5,1)}
  @keyframes pop{0%{transform:scale(.2);opacity:0}100%{transform:scale(1);opacity:1}}
  .done h1{font-size:28px;margin:14px 0 4px;color:var(--gold)}
  .done .sub{color:var(--muted);font-size:15px;margin-bottom:26px}
  .done .rewards{display:flex;gap:14px;margin-bottom:30px}
  .rw{border:3px solid var(--gold);border-radius:16px;padding:4px;min-width:96px;overflow:hidden}
  .rw .cap{background:var(--gold);color:#fff;font-size:11px;font-weight:800;letter-spacing:.6px;padding:3px;border-radius:9px 9px 0 0;margin:-4px -4px 0}
  .rw .val{font-size:24px;font-weight:800;padding:12px 0;color:var(--gold-d)}
  .rw.blue{border-color:var(--blue)} .rw.blue .cap{background:var(--blue)} .rw.blue .val{color:var(--blue-d)}
  .rw.flame{border-color:#ff9600} .rw.flame .cap{background:#ff9600} .rw.flame .val{color:#ff7a00}

  .toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);
    padding:10px 18px;border-radius:12px;font-size:14px;font-weight:800;z-index:90;opacity:0;transition:.3s;pointer-events:none}
  .toast.show{opacity:1}

  .home-foot{text-align:center;color:var(--muted);font-size:11px;font-weight:700;padding:10px 30px 30px;line-height:1.5}

  /* confetti */
  .confetti{position:fixed;width:10px;height:14px;top:-20px;z-index:70;will-change:transform}

  /* ---- teaching card (Learn mode) ---- */
  .teach{background:var(--card);border:2px solid var(--line);border-bottom-width:4px;border-radius:18px;overflow:hidden;margin-top:6px}
  .teach-h{background:var(--teal);color:#04261d;font-size:18px;font-weight:800;padding:14px 16px;line-height:1.3}
  .teach-b{padding:16px 16px 18px;font-size:16px;font-weight:600;line-height:1.62;color:var(--ink)}
  .teach-b b{color:var(--teal-d)}
  @media (prefers-color-scheme:dark){ .teach-h{color:#d7fff4} .teach-b b{color:#5ee0c2} }

  /* ---- bottom nav ---- */
  .nav{position:sticky;bottom:0;display:flex;gap:10px;padding:8px 18px calc(8px + env(safe-area-inset-bottom));
    background:var(--bg);border-top:2px solid var(--line);z-index:25}
  .navbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;border:none;
    font-size:21px;color:var(--muted);padding:7px;border-radius:13px;cursor:pointer;font-weight:800}
  .navbtn span{font-size:10.5px;letter-spacing:.8px}
  .navbtn.on{color:var(--green-d);background:var(--greenbg)}
  @media (prefers-color-scheme:dark){ .navbtn.on{color:#9be861;background:#16301a} }

  /* ---- Learn library ---- */
  .learn-intro{margin:18px 16px 6px;font-size:20px;font-weight:800}
  .learn-intro span{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-top:6px;line-height:1.5}
  .cgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px 16px 24px}
  .ctile{background:var(--card);border:2px solid var(--line);border-bottom:5px solid var(--cs,var(--line2));
    border-radius:16px;padding:15px 14px;cursor:pointer;text-align:left;transition:.06s;min-height:120px;display:flex;flex-direction:column;gap:7px}
  .ctile:active{transform:translateY(2px);border-bottom-width:3px}
  .ctile .cic{font-size:27px;width:50px;height:50px;border-radius:13px;display:grid;place-items:center;background:var(--cc,var(--blue));box-shadow:0 3px 0 var(--cs)}
  .ctile .cname{font-size:14.5px;font-weight:800;line-height:1.2;color:var(--ink)}
  .ctile .cmeta{font-size:11.5px;font-weight:700;color:var(--muted);margin-top:auto}

  /* ---- key-numbers list (gold cheat card) ---- */
  ul.keys{margin:0;padding-left:20px}
  ul.keys li{margin:8px 0;font-weight:700;line-height:1.45}
  ul.keys li b{color:var(--gold-d)}
  @media (prefers-color-scheme:dark){ ul.keys li b{color:#ffd24d} }

  /* ---- Profile / YOU tab ---- */
  .btn.blue{background:var(--blue);--bd:var(--blue-d)}
  .prof-top{display:flex;align-items:center;gap:16px;padding:20px 18px 8px}
  .prof-lvl{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--teal));
    color:#04121f;font-size:27px;font-weight:800;display:grid;place-items:center;box-shadow:0 4px 0 var(--blue-d);flex:none}
  .prof-meta{flex:1;min-width:0}
  .prof-meta b{font-size:20px}
  .xpbar{height:12px;background:var(--line);border-radius:999px;overflow:hidden;margin:6px 0 4px}
  .xpfill{height:100%;background:var(--blue);border-radius:999px;transition:width .4s}
  .prof-meta span{font-size:12px;color:var(--muted);font-weight:700}
  .goal{margin:10px 16px;padding:12px 14px;background:var(--card);border:2px solid var(--line);border-radius:14px;font-size:14px;font-weight:700}
  .goal b{float:right;color:var(--gold-d)}
  .goalbar{height:10px;background:var(--line);border-radius:999px;overflow:hidden;margin-top:10px;clear:both}
  .goalfill{height:100%;background:var(--gold);border-radius:999px;transition:width .4s}
  .statrow{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;padding:6px 16px 10px}
  .stat2{background:var(--card);border:2px solid var(--line);border-radius:12px;padding:10px 3px;text-align:center}
  .stat2 b{display:block;font-size:15px}
  .stat2 span{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
  .ach-h{font-size:18px;font-weight:800;margin:12px 16px 4px}
  .ach-h span{font-size:13px;color:var(--muted);font-weight:700}
  .achgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:6px 16px 26px}
  .ach{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:13px 10px;text-align:center;opacity:.5}
  .ach.got{opacity:1;border-color:var(--gold);box-shadow:0 3px 0 var(--gold-d)}
  .ach-ic{font-size:30px}
  .ach-n{font-size:13.5px;font-weight:800;margin-top:5px}
  .ach-d{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px;line-height:1.3}
</style>
</head>
<body>
<div class="app">
  <!-- HUD -->
  <div class="hud">
    <div class="item flame"><span class="ic">🔥</span><span id="hudStreak">0</span></div>
    <div class="item gem"><span class="ic">💎</span><span id="hudXp">0</span></div>
    <div class="item heart"><span class="ic">❤️</span><span id="hudHearts">5</span></div>
    <div class="spacer"></div>
    <div class="lvl" id="hudLvl">Level 1</div>
  </div>

  <div class="scroll" id="home"></div>
  <div class="scroll" id="learn" style="display:none"></div>
  <div class="scroll" id="you" style="display:none"></div>

  <div class="home-foot">
    EP Quest · educational practice only — model answers are teaching defaults, not clinical directives.
    Always check against ESSA &amp; current guidelines. Progress saved on this device.
  </div>

  <div class="nav">
    <button class="navbtn on" id="navQuest" onclick="showTab('quest')">🎮<span>QUEST</span></button>
    <button class="navbtn" id="navLearn" onclick="showTab('learn')">📚<span>LEARN</span></button>
    <button class="navbtn" id="navYou" onclick="showTab('you')">🏅<span>YOU</span></button>
  </div>
</div>

<!-- Lesson player -->
<div class="player" id="player">
  <div class="ptop">
    <button class="quit" onclick="quitLesson()">✕</button>
    <div class="bar"><div class="fill" id="barFill"></div></div>
    <div class="hearts">❤️<span id="liveHearts">5</span></div>
  </div>
  <div class="qarea" id="qarea"></div>
  <div class="foot" id="foot">
    <button class="btn gray" id="checkBtn" disabled onclick="onCheck()">Check</button>
  </div>
</div>

<!-- Complete -->
<div class="done" id="done">
  <div class="trophy" id="trophyIcon">🏆</div>
  <h1 id="doneTitle">Lesson complete!</h1>
  <div class="sub" id="doneSub">You're building the reflex.</div>
  <div class="rewards">
    <div class="rw flame"><div class="cap">STREAK</div><div class="val" id="rwStreak">1</div></div>
    <div class="rw"><div class="cap">TOTAL XP</div><div class="val" id="rwXp">10</div></div>
    <div class="rw blue"><div class="cap">ACCURACY</div><div class="val" id="rwAcc">100%</div></div>
  </div>
  <button class="btn green" style="max-width:300px" onclick="closeDone()">Continue</button>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   EP QUEST — content
   Question types: mc (one answer), multi (tap all), match (pairs)
   ============================================================ */
const UNITS = [
 {
  title:"Unit 1 · The EP Brain", sub:"The 6 questions, in order", color:"var(--green)", shadow:"var(--green-d)", icon:"🧠",
  lessons:[
   { title:"Meet the 6 questions", icon:"⭐", qs:[
     {type:"mc", kind:"The framework", q:"What's the FIRST question of the EP Brain for every client?",
      options:["What condition are we dealing with?","What's the safest starting dose?","What are they trying to do?","How do we progress?"],
      answer:0, explain:"Start by naming the condition and how it behaves during exercise — the pathophysiology lens."},
     {type:"mc", kind:"The framework", q:"Which question is the SAFETY layer?",
      options:["Q1 — What condition?","Q2 — What can kill or seriously harm them?","Q4 — What can they tolerate?","Q6 — How do we progress?"],
      answer:1, explain:"Q2 is the safety layer: red flags, danger numbers, and stop rules. Never skipped."},
     {type:"mc", kind:"Order", q:"You've named the condition and screened for danger. What comes NEXT?",
      options:["Pick the safest dose","Find out what they're trying to do","Test their balance","Plan progression"],
      answer:1, explain:"Q3 — the client's goal, in their words. It decides what you test and what you dose."},
     {type:"multi", kind:"Tap all that apply", q:"Which of these are among the 6 questions?",
      options:["What can they currently tolerate?","What's the safest starting dose?","What's their insurance number?","How do we progress?"],
      answers:[0,1,3], explain:"The 6: condition, danger, goal, tolerance, safest dose, progression. Insurance isn't clinical reasoning."},
     {type:"match", kind:"Match them up", q:"Match each question to what it really means:",
      pairs:[["Q2 Danger","Safety layer"],["Q4 Tolerance","Objective baseline"],["Q5 Dose","Safe first step"]],
      explain:"Danger = safety layer, Tolerance = baseline you measure, Dose = the safe first step (not the perfect program)."},
     {type:"mc", kind:"The framework", q:"What is Q5 — the 'safest starting dose' — really asking for?",
      options:["The most effective program possible","The safe first step they'll actually do","The hardest they can tolerate","A discharge plan"],
      answer:1, explain:"Not the perfect program — the safe first step. Success in week 1 beats stimulus."},
   ]},
   { title:"Goal & dose logic", icon:"🎯", qs:[
     {type:"mc", kind:"Reasoning", q:"A client says \"I want to lose weight.\" Which trainable qualities do you hear?",
      options:["Only heavy strength work","Aerobic volume + strength to protect muscle + adherence","Balance and reaction time","Sprint speed"],
      answer:1, explain:"Energy balance via aerobic volume, strength to preserve muscle, and adherence above all."},
     {type:"mc", kind:"Reasoning", q:"\"I want to stay independent and not go into a home.\" Best target qualities?",
      options:["1RM bench press","Balance, power, grip, sit-to-stand, falls prevention","VO₂max only","Flexibility"],
      answer:1, explain:"Independence = balance, lower-limb power, grip, functional tasks, falls prevention."},
     {type:"mc", kind:"Dosing", q:"What's the safest order to progress the early variables?",
      options:["Intensity → duration → frequency","Frequency → duration → intensity","Load → speed → range","Random is fine"],
      answer:1, explain:"Build the habit (frequency), then volume (duration), then the hard work (intensity)."},
     {type:"mc", kind:"Dosing", q:"The 'dose check' before a client leaves is:",
      options:["\"Did they sweat enough?\"","\"If they do this on their WORST day this week, are they still safe?\"","\"Was it their max?\"","\"Did they enjoy it?\""],
      answer:1, explain:"If yes, that's the dose. If no, cut it down."},
     {type:"multi", kind:"Tap all that apply", q:"Good objective baseline tests (Q4) include:",
      options:["6-minute walk test","30-second sit-to-stand","Timed Up and Go","Their horoscope"],
      answers:[0,1,2], explain:"6MWT (aerobic), 30s-STS (strength), TUG (balance/falls). Pick 2–4 that match the goal."},
   ]},
   { title:"Spot the question", icon:"🔎", qs:[
     {type:"mc", kind:"Which question?", q:"\"He wants to walk his daughter down the aisle next year.\" Which EP Brain question is this?",

 {

   { title:"Who pays for EP?", icon:"💰", qs:[
     {type:"info", kind:"EP Business", title:"The funding streams", body:"As an <b>Accredited Exercise Physiologist (AEP)</b> in Australia, your work can be funded through several streams: <b>Medicare</b> (chronic disease plans), <b>NDIS</b>, <b>DVA</b> (veterans), <b>private health</b> insurance (extras), <b>workers comp / CTP</b> (injury), and private self-funded clients. Building a caseload means mixing these. <i>(Rules, item numbers and rebates change — always verify current details with ESSA, Services Australia and the NDIS.)</i>"},
     {type:"mc", kind:"EP Business", q:"AEPs are accredited by which body?",
      options:["ESSA (Exercise & Sports Science Australia)","AHPRA","Fitness Australia","The RACGP"], answer:0, explain:"ESSA accredits AEPs. (EPs are self-regulated via ESSA — not AHPRA-registered like physios.)"},
     {type:"mc", kind:"EP Business", q:"What separates an AEP from a personal trainer?",
      options:["Nothing","University-qualified allied health who work with clinical/complex conditions and access funding streams","AEPs only do group classes","PTs are more qualified"], answer:1, explain:"AEPs are 4-year university-qualified allied health professionals who manage clinical populations and can access Medicare/NDIS/DVA etc."},
     {type:"multi", kind:"Tap all that can fund EP", q:"Which can fund exercise physiology services?",
      options:["Medicare (chronic disease plans)","NDIS","DVA (veterans)","Private health extras"], answers:[0,1,2,3], explain:"All of these fund AEP services — plus workers comp/CTP and private clients."},
   ]},
   { title:"Medicare & referrals", icon:"🩺", qs:[
     {type:"info", kind:"EP Business", title:"Medicare CDM", body:"Under a GP's <b>Chronic Disease Management (CDM)</b> plan, an eligible patient with a chronic condition can access up to <b>5 allied health services per calendar year</b> — and that 5 is <b>shared across all allied health</b> (physio, dietitian, EP, etc.), not 5 each. The GP refers; the patient gets a Medicare rebate; you need a Medicare <b>provider number</b>."},
     {type:"mc", kind:"EP Business", q:"Under a CDM plan, how many rebated allied health sessions per calendar year?",
      options:["Unlimited","Up to 5, shared across all allied health","20 each","1"], answer:1, explain:"Up to 5 per calendar year, shared across all allied health providers."},
     {type:"mc", kind:"EP Business", q:"Who initiates the CDM referral to you?",
      options:["The patient","The GP","ESSA","The NDIS"], answer:1, explain:"The GP creates the CDM plan and refers."},
     {type:"mc", kind:"EP Business", q:"To bill Medicare, an AEP needs a:",
      options:["Personal training cert","Medicare provider number","Gym membership","Police check only"], answer:1, explain:"You register as an AEP to obtain a Medicare provider number."},
   ]},
   { title:"NDIS basics", icon:"🧩", qs:[
     {type:"info", kind:"EP Business", title:"EP in the NDIS", body:"EP usually sits under <b>Capacity Building → Improved Health &amp; Wellbeing</b> (sometimes Improved Daily Living). Providers can be <b>registered or unregistered</b> — and unregistered providers can still serve <b>plan-managed</b> and <b>self-managed</b> participants (just not NDIA/agency-managed ones). Clear reports and <b>outcome measures</b> are what justify continued funding."},
     {type:"mc", kind:"EP Business", q:"EP services in the NDIS usually fall under:",
      options:["Core supports","Capacity Building (Improved Health & Wellbeing)","Transport","Nothing"], answer:1, explain:"EP is typically Capacity Building — Improved Health & Wellbeing."},
     {type:"mc", kind:"EP Business", q:"An UNregistered NDIS provider can see which participants?",
      options:["Only NDIA-managed","Plan-managed and self-managed","Nobody","Only children"], answer:1, explain:"Unregistered providers can serve plan-managed and self-managed (not NDIA/agency-managed) participants."},
     {type:"mc", kind:"EP Business", q:"What best justifies continued NDIS funding?",
      options:["Charging more","Demonstrating progress with outcome measures and reports","Seeing more clients","Nothing needed"], answer:1, explain:"Documented outcomes and reports evidence the value of ongoing support."},
   ]},
  ]

 {

     {type:"info", kind:"Pro Practice", title:"Being an AEP", body:"AEPs complete a <b>4-year university degree</b> and are accredited by <b>ESSA</b>. To keep accreditation you must hold <b>professional indemnity insurance</b> and meet ongoing <b>CPD</b> (continuing professional development) requirements. Practise within your <b>scope</b> and refer out when something is beyond it (that's what the red-flag screening is for)."},
     {type:"mc", kind:"Pro Practice", q:"AEP stands for:",
      options:["Approved Exercise Provider","Accredited Exercise Physiologist","Advanced Exercise Practitioner","Allied Exercise Professional"], answer:1, explain:"Accredited Exercise Physiologist."},
     {type:"mc", kind:"Pro Practice", q:"To maintain ESSA accreditation you must:",
      options:["Do nothing","Complete ongoing CPD and hold professional indemnity insurance","Re-sit university","Renew a gym licence"], answer:1, explain:"Ongoing CPD plus appropriate insurance keep your accreditation current."},
     {type:"mc", kind:"Pro Practice", q:"When something falls outside your scope, you:",
      options:["Guess","Refer to the appropriate professional","Ignore it","Push on regardless"], answer:1, explain:"Work within scope and refer out (e.g. for red flags) — safer and more professional."},
   ]},
   { title:"Running the business", icon:"📈", qs:[
     {type:"info", kind:"Pro Practice", title:"The business behind the sessions", body:"Your real <b>hourly rate must cover non-billable time</b> — travel, note-writing, admin, and no-shows. A session fee is not profit. Sustainable practice comes from sensible <b>pricing</b>, strong <b>referral relationships</b> (GPs, support coordinators, other allied health), and clear <b>documentation / outcome reporting</b> that satisfies funders."},
     {type:"mc", kind:"Pro Practice", q:"Why can't your session fee equal your hourly profit?",
      options:["It does","Travel, notes, admin and no-shows eat into billable time","Tax doesn't exist","Clients pay double"], answer:1, explain:"Non-billable time (travel, documentation, admin, no-shows) means your effective rate is lower than the headline fee — exactly what your business calculators model."},
     {type:"mc", kind:"Pro Practice", q:"Valuable referral relationships for an EP include:",
      options:["Only other EPs","GPs, NDIS support coordinators and other allied health","Nobody","Competitors only"], answer:1, explain:"GPs (CDM), support coordinators (NDIS) and allied health colleagues drive referrals."},
     {type:"mc", kind:"Pro Practice", q:"Good documentation matters because it:",
      options:["Wastes time","Supports funding/outcomes, continuity of care and medico-legal cover","Is optional","Only helps marketing"], answer:1, explain:"Notes and outcome measures justify funding, maintain continuity, and protect you medico-legally."},
   ]},

      options:["Charging extra","Accepting the Medicare rebate as full payment (no out-of-pocket)","Billing in bulk monthly","Refusing Medicare"], answer:1, explain:"Bulk-billing = the rebate is the full fee; the client pays no gap."},
     {type:"mc", kind:"Business Growth", q:"A 'gap' fee is:",

     {type:"mc", kind:"Business Growth", q:"Before invoicing clients in Australia, you need an:",

 {

     {type:"info", kind:"Prescription", title:"FITT", body:"Exercise prescription is built on <b>FITT</b>: <b>F</b>requency, <b>I</b>ntensity, <b>T</b>ime, <b>T</b>ype — often extended to <b>FITT-VP</b> (adding Volume and Progression). Adjust one element at a time: the same 'one lever' idea as the EP Brain's progression step."},
     {type:"mc", kind:"Prescription", q:"FITT stands for:",
      options:["Fast, Intense, Tough, Timed","Frequency, Intensity, Time, Type","Fitness In Ten Tries","Force, Impact, Tempo, Tension"], answer:1, explain:"Frequency, Intensity, Time, Type (FITT-VP adds Volume & Progression)."},
     {type:"mc", kind:"Prescription", q:"To keep adapting, you must apply:",
      options:["Progressive overload","Total rest","The same workout forever","Maximal effort always"], answer:0, explain:"Progressive overload — gradually increasing the demand — drives ongoing adaptation."},
     {type:"mc", kind:"Prescription", q:"Specificity means:",
      options:["All exercise is equal","Adaptations are specific to the stimulus you train","Only cardio counts","Genetics decide everything"], answer:1, explain:"You adapt to what you train — train the quality you want to improve."},
     {type:"mc", kind:"Prescription", q:"Reversibility ('use it or lose it') means:",
      options:["Gains are permanent","Gains are lost when training stops","You can't lose fitness","Rest is pointless"], answer:1, explain:"Detraining reverses adaptations — consistency matters."},
   ]},
   { title:"Intensity & safety", icon:"🎚️", qs:[
     {type:"info", kind:"Prescription", title:"Dosing intensity", body:"Gauge intensity with <b>%HRmax / heart-rate reserve (Karvonen)</b>, the <b>talk test</b>, or <b>RPE</b> (Borg). When HR is unreliable — beta-blockers, deconditioning, pacemakers, autonomic issues — use <b>RPE and the talk test</b>. Always include a <b>warm-up and cool-down</b>, especially with cardiac and older clients."},
     {type:"mc", kind:"Prescription", q:"When heart rate is unreliable, gauge intensity with:",
      options:["Guesswork","RPE and the talk test","Max HR test","Step count only"], answer:1, explain:"RPE and the talk test work when HR can't be trusted (e.g. beta-blockers)."},

      options:["Light intensity","Moderate intensity","Maximal intensity","Rest"], answer:1, explain:"Talking but not singing is roughly moderate intensity."},
     {type:"mc", kind:"Prescription", q:"Warm-up and cool-down matter because they:",
      options:["Waste time","Prepare the body, reduce injury/cardiac risk and aid recovery","Only help flexibility","Are optional always"], answer:1, explain:"They ease the body in and out of effort — important for cardiac and older clients."},
     {type:"mc", kind:"Prescription", q:"Individualisation means:",
      options:["One program for everyone","Tailoring the dose to the person's condition, goals and capacity","Copying elite athletes","Ignoring the client"], answer:1, explain:"Match the prescription to the individual — the heart of the EP Brain framework."},
